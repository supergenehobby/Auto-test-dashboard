<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프리플레이 통합 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg-body: #0b1120;
  --bg-card: #0f1a2e;
  --bg-topbar: #0f1a2e;
  --border: #1e3a5f;
  --text-primary: #e2e8f0;
  --text-secondary: #c8d1da;
  --text-muted: #8b9bb0;
  --status-ok: #10b981;
  --status-warn: #f59e0b;
  --status-err: #ef4444;
  --fs-scale: 1;
}
[data-theme="light"] {
  --bg-body: #f8fafc;
  --bg-card: #ffffff;
  --bg-topbar: #ffffff;
  --border: #e2e8f0;
  --text-primary: #1e293b;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg-body);
  color: var(--text-primary);
  font-size: calc(14px * var(--fs-scale));
}
a { color: #60a5fa; text-decoration: none; }

/* ── Top Bar ── */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px;
  background: var(--bg-topbar);
  border-bottom: 1px solid var(--border);
}
.logo { font-weight: 700; font-size: calc(15px * var(--fs-scale)); white-space: nowrap; }
.gtab {
  padding: 6px 18px; border: 1.5px solid var(--gc, #3b82f6); border-radius: 20px;
  background: transparent; color: var(--gc, #3b82f6);
  font-size: calc(13px * var(--fs-scale)); font-weight: 600; cursor: pointer;
  transition: background .15s, color .15s; opacity: .55;
}
.gtab.active { background: var(--gc, #3b82f6); color: #fff; opacity: 1; }
.gtab:hover:not(.active) { opacity: .9; }
.ctrl-group { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.ctrl-btn {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-card); color: var(--text-secondary);
  font-size: calc(12px * var(--fs-scale)); font-weight: 600; cursor: pointer;
}
.ctrl-btn:hover { color: var(--text-primary); border-color: var(--text-secondary); }
.ts { font-size: calc(11px * var(--fs-scale)); color: var(--text-muted); white-space: nowrap; }

/* ── Content ── */
.content { padding: 16px; max-width: 1400px; margin: 0 auto; }
.ov-summary {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 18px; margin-bottom: 16px;
  font-size: calc(13px * var(--fs-scale)); color: var(--text-secondary);
}
.ov-summary b { color: var(--text-primary); }

/* ── Cards ── */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 16px; }
.game-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; border-left: 3px solid var(--gc, #3b82f6);
}
.game-card h3 { font-size: calc(16px * var(--fs-scale)); margin-bottom: 8px; }
.game-card .stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: calc(13px * var(--fs-scale)); }
.game-card .stat-label { color: var(--text-muted); }
.game-card .stat-value { font-weight: 600; }

/* ── Charts ── */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.chart-box {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
}
.chart-box h4 { font-size: calc(14px * var(--fs-scale)); margin-bottom: 12px; color: var(--text-secondary); }
.chart-box canvas { max-height: 300px; }

/* ── Table ── */
.tbl-wrap {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; margin-bottom: 16px; overflow-x: auto;
}
.tbl-wrap h4 { font-size: calc(14px * var(--fs-scale)); margin-bottom: 12px; color: var(--text-secondary); }
table { width: 100%; border-collapse: collapse; font-size: calc(12px * var(--fs-scale)); }
th { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 600; }
td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
tr:hover td { background: rgba(59,130,246,.05); }

/* ── Loading/Error ── */
.state-msg {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; gap: 12px; color: var(--text-muted);
}
.state-msg .icon { font-size: 48px; opacity: .3; }
.state-msg button {
  margin-top: 8px; padding: 8px 20px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg-card); color: var(--text-primary); cursor: pointer; font-size: 14px;
}

/* ── Game Detail ── */
.game-detail { display: none; }
.game-detail.active { display: block; }
.persona-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 16px; }
.persona-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px;
}
.persona-card h5 { font-size: calc(13px * var(--fs-scale)); margin-bottom: 6px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-ok { background: rgba(16,185,129,.15); color: #10b981; }
.badge-warn { background: rgba(245,158,11,.15); color: #f59e0b; }
.badge-err { background: rgba(239,68,68,.15); color: #ef4444; }

/* ── Category Tabs ── */
.cat-tabs {
  display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); padding-bottom: 8px;
}
.cat-tab {
  padding: 6px 14px; border: none; border-radius: 8px 8px 0 0;
  background: transparent; color: var(--text-muted);
  font-size: calc(13px * var(--fs-scale)); font-weight: 600; cursor: pointer;
  transition: background .15s, color .15s;
}
.cat-tab.active { background: var(--bg-card); color: var(--text-primary); border-bottom: 2px solid #3b82f6; }
.cat-tab:hover:not(.active) { color: var(--text-secondary); }
.cat-panel { display: none; }
.cat-panel.active { display: block; }

/* ── Metric Row ── */
.metric-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.metric-box {
  flex: 1; min-width: 180px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
}
.metric-box .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.metric-box .value { font-size: 22px; font-weight: 700; }
.metric-box .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ── Security ── */
.check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 8px; }
.check-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
  font-size: calc(12px * var(--fs-scale));
}
.check-pass { color: var(--status-ok); }
.check-fail { color: var(--status-err); font-weight: 600; }

/* ── Perf ── */
.perf-gauge { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.gauge-box {
  flex: 1; min-width: 200px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
}
.gauge-bar { height: 8px; border-radius: 4px; background: var(--border); margin-top: 8px; overflow: hidden; }
.gauge-fill { height: 100%; border-radius: 4px; transition: width .3s; }

@media (max-width: 768px) {
  .cards { grid-template-columns: 1fr; }
  .chart-grid { grid-template-columns: 1fr; }
  .persona-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
  <div class="top-bar">
    <span class="logo">🎮 통합 대시보드</span>
    <div id="game-tabs"></div>
    <div class="ctrl-group">
      <button class="ctrl-btn" onclick="changeFontSize(-1)" title="글자 축소">A-</button>
      <button class="ctrl-btn" onclick="changeFontSize(1)" title="글자 확대">A+</button>
      <button class="ctrl-btn" id="themeBtn" onclick="toggleTheme()" title="테마 전환">☀</button>
      <button class="ctrl-btn" onclick="downloadCSV()" title="CSV 다운로드">CSV</button>
      <span class="ts" id="update-time"></span>
    </div>
  </div>

  <div class="content">
    <div id="loading" class="state-msg">
      <div class="icon">⏳</div>
      <div>데이터 로딩 중...</div>
    </div>
    <div id="error" class="state-msg" style="display:none"></div>
    <div id="overview-panel" style="display:none"></div>
    <div id="game-panels"></div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════
   Supabase 실시간 대시보드
   ═══════════════════════════════════════════════════════ */

const SUPABASE_URL = 'https://lxkvjwnhrqbtaglwkgmf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_d_sWb1OmWgs0oKrWPCxr5g_ARo_7kq7';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PERSONA_KO = { hardcore: '고수', average: '중수', casual: '하수', struggling: '초보' };
const PERSONA_COLORS = { hardcore: '#3b82f6', average: '#10b981', casual: '#f59e0b', struggling: '#ef4444' };
const DIFF_TIERS = { 1: '튜토리얼', 2: '노말', 3: '하드', 4: '슈퍼하드' };

let _allRuns = [];
let _charts = {};

/* ── 데이터 Fetch ── */

async function fetchRuns() {
  const { data, error } = await sb
    .from('freeplay_runs')
    .select('*')
    .order('run_date', { ascending: false });
  if (error) throw error;
  return data || [];
}

async function fetchCronHistory() {
  const { data, error } = await sb
    .from('cron_history')
    .select('*')
    .order('run_date', { ascending: false })
    .limit(30);
  if (error) throw error;
  return data || [];
}

async function fetchStages(gameId) {
  const { data, error } = await sb
    .from('stage_results')
    .select('*')
    .eq('game_id', gameId)
    .order('created_at', { ascending: false })
    .limit(2000);
  if (error) throw error;
  return data || [];
}

/* ── 집계 ── */

function aggregateOverview(runs) {
  const games = {};
  for (const r of runs) {
    if (!games[r.game_id]) {
      games[r.game_id] = { runs: 0, levels: 0, cleared: 0, time: 0, personas: {}, dailyMap: {} };
    }
    const g = games[r.game_id];
    g.runs++;
    g.levels += r.levels_played || 0;
    g.cleared += r.levels_cleared || 0;
    g.time += r.total_time_sec || 0;

    const p = r.persona;
    if (!g.personas[p]) g.personas[p] = { played: 0, cleared: 0, runs: 0 };
    g.personas[p].played += r.levels_played || 0;
    g.personas[p].cleared += r.levels_cleared || 0;
    g.personas[p].runs++;

    const d = r.run_date;
    if (!g.dailyMap[d]) g.dailyMap[d] = { levels: 0, cleared: 0 };
    g.dailyMap[d].levels += r.levels_played || 0;
    g.dailyMap[d].cleared += r.levels_cleared || 0;
  }
  return games;
}

/* ── 렌더링: 종합 탭 ── */

function renderOverview(games) {
  const panel = document.getElementById('overview-panel');
  const totalLevels = Object.values(games).reduce((a, g) => a + g.levels, 0);
  const totalCleared = Object.values(games).reduce((a, g) => a + g.cleared, 0);
  const totalRuns = Object.values(games).reduce((a, g) => a + g.runs, 0);
  const totalTime = Object.values(games).reduce((a, g) => a + g.time, 0);
  const cr = totalLevels ? (totalCleared / totalLevels * 100).toFixed(1) : 0;
  const timeStr = totalTime >= 3600
    ? `${(totalTime / 3600).toFixed(1)}시간`
    : `${Math.round(totalTime / 60)}분`;

  panel.innerHTML = `
    <div class="ov-summary">
      <b>전체 현황</b> &nbsp;·&nbsp;
      게임 <b>${Object.keys(games).length}종</b> &nbsp;·&nbsp;
      총 런 <b>${totalRuns}</b> &nbsp;·&nbsp;
      총 판 <b>${totalLevels.toLocaleString()}</b> &nbsp;·&nbsp;
      전체 클리어율 <b>${cr}%</b> &nbsp;·&nbsp;
      총 <b>${timeStr}</b>
    </div>
    <div class="cards">${Object.entries(games).map(([gid, g]) => renderGameCard(gid, g)).join('')}</div>
    <div class="chart-grid">
      <div class="chart-box"><h4>페르소나별 클리어율</h4><canvas id="chart-persona"></canvas></div>
      <div class="chart-box"><h4>일별 클리어율 추이</h4><canvas id="chart-daily"></canvas></div>
    </div>
    <div id="cron-section"></div>
  `;
  panel.style.display = 'block';

  renderPersonaChart(games);
  renderDailyChart(games);
}

function renderGameCard(gid, g) {
  const cr = g.levels ? (g.cleared / g.levels * 100).toFixed(1) : 0;
  const badge = cr >= 90 ? 'badge-ok' : cr >= 70 ? 'badge-warn' : 'badge-err';
  const timeStr = g.time >= 3600
    ? `${(g.time / 3600).toFixed(1)}시간`
    : `${Math.round(g.time / 60)}분`;

  const personaRows = Object.entries(g.personas)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([p, d]) => {
      const pcr = d.played ? (d.cleared / d.played * 100).toFixed(1) : 0;
      return `<div class="stat"><span class="stat-label">${PERSONA_KO[p] || p}</span><span class="stat-value">${pcr}% (${d.played}판)</span></div>`;
    }).join('');

  return `
    <div class="game-card" style="--gc:${PERSONA_COLORS.hardcore}">
      <h3>${gid}</h3>
      <div class="stat"><span class="stat-label">클리어율</span><span class="stat-value"><span class="badge ${badge}">${cr}%</span></span></div>
      <div class="stat"><span class="stat-label">총 런/판</span><span class="stat-value">${g.runs}런 / ${g.levels.toLocaleString()}판</span></div>
      <div class="stat"><span class="stat-label">소요시간</span><span class="stat-value">${timeStr}</span></div>
      ${personaRows}
    </div>
  `;
}

/* ── 차트 ── */

function renderPersonaChart(games) {
  const allPersonas = new Set();
  Object.values(games).forEach(g => Object.keys(g.personas).forEach(p => allPersonas.add(p)));
  const personas = [...allPersonas].sort();
  const gameIds = Object.keys(games);

  const datasets = gameIds.map((gid, i) => ({
    label: gid,
    data: personas.map(p => {
      const d = games[gid].personas[p];
      return d && d.played ? +(d.cleared / d.played * 100).toFixed(1) : 0;
    }),
    backgroundColor: Object.values(PERSONA_COLORS)[i % 4],
  }));

  if (_charts.persona) _charts.persona.destroy();
  _charts.persona = new Chart(document.getElementById('chart-persona'), {
    type: 'bar',
    data: { labels: personas.map(p => PERSONA_KO[p] || p), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } },
      plugins: { legend: { labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary') } } },
    },
  });
}

function renderDailyChart(games) {
  const allDates = new Set();
  Object.values(games).forEach(g => Object.keys(g.dailyMap).forEach(d => allDates.add(d)));
  const dates = [...allDates].sort();
  const gameIds = Object.keys(games);

  const datasets = gameIds.map((gid, i) => ({
    label: gid,
    data: dates.map(d => {
      const dd = games[gid].dailyMap[d];
      return dd && dd.levels ? +(dd.cleared / dd.levels * 100).toFixed(1) : null;
    }),
    borderColor: Object.values(PERSONA_COLORS)[i % 4],
    tension: 0.3, fill: false, spanGaps: true,
  }));

  if (_charts.daily) _charts.daily.destroy();
  _charts.daily = new Chart(document.getElementById('chart-daily'), {
    type: 'line',
    data: { labels: dates.map(d => d.slice(5)), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } },
      plugins: { legend: { labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary') } } },
    },
  });
}

/* ── 크론 이력 ── */

function renderCronHistory(cron) {
  if (!cron || !cron.length) return;
  const section = document.getElementById('cron-section');
  const rows = cron.map(c => {
    const res = c.results || {};
    const games = Object.entries(res).map(([g, r]) => `${g}:${r.exit_code === 0 ? 'OK' : 'FAIL'}`).join(', ');
    return `<tr>
      <td>${c.run_date}</td>
      <td>${c.time_slot === 'morning' ? '아침' : '저녁'}</td>
      <td>${c.levels_target || '-'}</td>
      <td>${games || '-'}</td>
      <td>${c.duration_min || '-'}분</td>
      <td>${c.deploy_ok ? '<span style="color:var(--status-ok)">OK</span>' : '<span style="color:var(--status-err)">FAIL</span>'}</td>
    </tr>`;
  }).join('');

  section.innerHTML = `
    <div class="tbl-wrap">
      <h4>크론 실행 이력</h4>
      <table>
        <thead><tr><th>날짜</th><th>시간대</th><th>목표</th><th>결과</th><th>소요</th><th>배포</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

/* ── 게임 탭 ── */

function renderGameTabs(gameIds) {
  const tabsEl = document.getElementById('game-tabs');
  tabsEl.innerHTML =
    `<button class="gtab active" style="--gc:#f59e0b" onclick="switchTab('overview',this)">종합</button>` +
    gameIds.map(gid =>
      `<button class="gtab" style="--gc:${PERSONA_COLORS.hardcore}" onclick="switchTab('${gid}',this)">${gid}</button>`
    ).join('');
}

async function switchTab(id, btn) {
  document.querySelectorAll('.gtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const overview = document.getElementById('overview-panel');
  const panels = document.getElementById('game-panels');

  if (id === 'overview') {
    overview.style.display = 'block';
    panels.innerHTML = '';
    return;
  }

  overview.style.display = 'none';
  panels.innerHTML = '<div class="state-msg"><div class="icon">⏳</div><div>게임 데이터 로딩 중...</div></div>';

  try {
    const stages = await fetchStages(id);
    const gameRuns = _allRuns.filter(r => r.game_id === id);
    panels.innerHTML = renderGameDetail(id, stages, gameRuns);
    // 밸런스 탭 차트
    setTimeout(() => {
      const diffCanvas = document.getElementById(`chart-diff-${id}`);
      if (diffCanvas) renderDifficultyChart(id, stages);
    }, 50);
    // 성능 탭 차트
    setTimeout(() => renderPerfCharts(id, gameRuns), 50);
  } catch (e) {
    panels.innerHTML = `<div class="state-msg"><div class="icon">⚠️</div><div>${id} 데이터 로딩 실패: ${e.message}</div></div>`;
  }
}

function renderGameDetail(gameId, stages, runs) {
  const cats = [
    { id: 'summary', label: '📊 요약' },
    { id: 'economy', label: '💰 경제' },
    { id: 'balance', label: '⚖️ 밸런스' },
    { id: 'items', label: '🃏 아이템' },
    { id: 'stages', label: '📋 스테이지' },
    { id: 'security', label: '🔒 보안 QA' },
    { id: 'perf', label: '📈 성능' },
  ];

  const tabsHtml = cats.map((c, i) =>
    `<button class="cat-tab${i === 0 ? ' active' : ''}" onclick="switchCat('${gameId}','${c.id}',this)">${c.label}</button>`
  ).join('');

  return `
    <div class="cat-tabs">${tabsHtml}</div>
    <div id="cat-summary-${gameId}" class="cat-panel active">${renderCatSummary(gameId, stages, runs)}</div>
    <div id="cat-economy-${gameId}" class="cat-panel">${renderCatEconomy(gameId, runs)}</div>
    <div id="cat-balance-${gameId}" class="cat-panel">${renderCatBalance(gameId, stages, runs)}</div>
    <div id="cat-items-${gameId}" class="cat-panel">${renderCatItems(gameId, runs)}</div>
    <div id="cat-stages-${gameId}" class="cat-panel">${renderCatStages(gameId, stages)}</div>
    <div id="cat-security-${gameId}" class="cat-panel">${renderCatSecurity(gameId, runs)}</div>
    <div id="cat-perf-${gameId}" class="cat-panel">${renderCatPerf(gameId, runs)}</div>
  `;
}

function switchCat(gameId, catId, btn) {
  btn.parentElement.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`[id^="cat-"][id$="-${gameId}"]`).forEach(p => p.classList.remove('active'));
  document.getElementById(`cat-${catId}-${gameId}`).classList.add('active');
}

/* ── 카테고리: 요약 ── */
function renderCatSummary(gameId, stages, runs) {
  const personas = {};
  for (const r of runs) {
    if (!personas[r.persona]) personas[r.persona] = { played: 0, cleared: 0, runs: 0, time: 0 };
    personas[r.persona].played += r.levels_played || 0;
    personas[r.persona].cleared += r.levels_cleared || 0;
    personas[r.persona].runs++;
    personas[r.persona].time += r.total_time_sec || 0;
  }
  const totalPlayed = Object.values(personas).reduce((a, p) => a + p.played, 0);
  const totalCleared = Object.values(personas).reduce((a, p) => a + p.cleared, 0);
  const cr = totalPlayed ? (totalCleared / totalPlayed * 100).toFixed(1) : 0;

  const personaCards = Object.entries(personas).sort(([a],[b]) => a.localeCompare(b)).map(([p, d]) => {
    const pcr = d.played ? (d.cleared / d.played * 100).toFixed(1) : 0;
    const badge = pcr >= 90 ? 'badge-ok' : pcr >= 70 ? 'badge-warn' : 'badge-err';
    const avgTime = d.played ? (d.time / d.played).toFixed(1) : 0;
    return `<div class="persona-card">
      <h5 style="color:${PERSONA_COLORS[p] || '#999'}">${PERSONA_KO[p] || p}</h5>
      <div class="stat"><span class="stat-label">클리어율</span><span class="stat-value"><span class="badge ${badge}">${pcr}%</span></span></div>
      <div class="stat"><span class="stat-label">판 수</span><span class="stat-value">${d.played}판 (${d.runs}런)</span></div>
      <div class="stat"><span class="stat-label">평균 시간</span><span class="stat-value">${avgTime}초</span></div>
    </div>`;
  }).join('');

  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">전체 클리어율</div><div class="value">${cr}%</div></div>
      <div class="metric-box"><div class="label">총 플레이</div><div class="value">${totalPlayed.toLocaleString()}판</div></div>
      <div class="metric-box"><div class="label">총 런</div><div class="value">${runs.length}</div></div>
      <div class="metric-box"><div class="label">페르소나</div><div class="value">${Object.keys(personas).length}종</div></div>
    </div>
    <div class="persona-grid">${personaCards}</div>
  `;
}

/* ── 카테고리: 경제 ── */
function renderCatEconomy(gameId, runs) {
  let totalGoldPnl = 0, totalHammerDelta = 0;
  const rows = runs.map(r => {
    const m = r.metrics || {};
    totalGoldPnl += m.gold_pnl || 0;
    totalHammerDelta += m.hammer_delta || 0;
    const goldColor = (m.gold_pnl || 0) >= 0 ? 'var(--status-ok)' : 'var(--status-err)';
    return `<tr>
      <td>${r.run_date}</td><td>${PERSONA_KO[r.persona] || r.persona}</td>
      <td style="color:${goldColor}">${(m.gold_pnl || 0).toLocaleString()}</td>
      <td>${(m.hammer_delta || 0).toLocaleString()}</td>
      <td>${(m.gold_start || 0).toLocaleString()}</td><td>${(m.gold_end || 0).toLocaleString()}</td>
    </tr>`;
  }).join('');

  // 베팅 집계
  const allBetting = {};
  for (const r of runs) {
    const bet = (r.metrics || {}).betting || {};
    for (const [mult, v] of Object.entries(bet)) {
      if (!allBetting[mult]) allBetting[mult] = { count: 0, cleared: 0 };
      allBetting[mult].count += v.count || 0;
      allBetting[mult].cleared += v.cleared || 0;
    }
  }
  const betRows = Object.entries(allBetting).sort(([a],[b]) => +a - +b).map(([mult, v]) => {
    const cr = v.count ? (v.cleared / v.count * 100).toFixed(1) : 0;
    return `<tr><td>x${mult}</td><td>${v.count}</td><td>${v.cleared}</td><td>${cr}%</td></tr>`;
  }).join('');

  const goldColor = totalGoldPnl >= 0 ? 'var(--status-ok)' : 'var(--status-err)';
  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">총 골드 수익</div><div class="value" style="color:${goldColor}">${totalGoldPnl.toLocaleString()}</div></div>
      <div class="metric-box"><div class="label">총 해머 변동</div><div class="value">${totalHammerDelta.toLocaleString()}</div></div>
    </div>
    ${betRows ? `<div class="tbl-wrap"><h4>베팅 배수별 통계</h4>
      <table><thead><tr><th>배수</th><th>시도</th><th>클리어</th><th>클리어율</th></tr></thead>
      <tbody>${betRows}</tbody></table></div>` : ''}
    <div class="tbl-wrap"><h4>런별 경제 상세</h4>
      <table><thead><tr><th>날짜</th><th>페르소나</th><th>골드 PnL</th><th>해머</th><th>골드 시작</th><th>골드 종료</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
  `;
}

/* ── 카테고리: 밸런스 ── */
function renderCatBalance(gameId, stages, runs) {
  // 난이도별
  const byDiff = {};
  for (const s of stages) {
    const d = s.difficulty || 0;
    if (!byDiff[d]) byDiff[d] = { played: 0, cleared: 0 };
    byDiff[d].played++;
    if (s.result === 'clear') byDiff[d].cleared++;
  }
  const diffRows = Object.entries(byDiff).sort(([a],[b]) => +a - +b).map(([d, v]) => {
    const cr = v.played ? (v.cleared / v.played * 100).toFixed(1) : 0;
    return `<tr><td>${DIFF_TIERS[d] || 'Tier '+d}</td><td>${v.played}</td><td>${v.cleared}</td><td>${cr}%</td></tr>`;
  }).join('');

  // 연패 분석
  const failParts = [];
  for (const r of runs) {
    const ft = (r.metrics || {}).fail_tracking || {};
    if (ft.max_consecutive_fails) {
      failParts.push(`<tr><td>${r.run_date}</td><td>${PERSONA_KO[r.persona] || r.persona}</td>
        <td>${ft.max_consecutive_fails || 0}</td>
        <td>${ft.fail_spiral_count || 0}</td>
        <td>${ft.pity_triggers || 0}</td></tr>`);
    }
  }

  return `
    <div class="chart-grid">
      <div class="chart-box"><h4>난이도별 클리어율</h4><canvas id="chart-diff-${gameId}"></canvas></div>
      <div class="tbl-wrap"><h4>난이도별 상세</h4>
        <table><thead><tr><th>난이도</th><th>플레이</th><th>클리어</th><th>클리어율</th></tr></thead>
        <tbody>${diffRows}</tbody></table></div>
    </div>
    ${failParts.length ? `<div class="tbl-wrap"><h4>연패 분석</h4>
      <table><thead><tr><th>날짜</th><th>페르소나</th><th>최대 연패</th><th>페일 스파이럴</th><th>Pity 발동</th></tr></thead>
      <tbody>${failParts.join('')}</tbody></table></div>` : ''}
  `;
}

/* ── 카테고리: 아이템 ── */
function renderCatItems(gameId, runs) {
  const totals = { wild: 0, gimmick: 0, extra: 0, undo: 0, retry: 0 };
  const byPersona = {};
  for (const r of runs) {
    const m = r.metrics || {};
    totals.wild += m.wild_count || 0;
    totals.gimmick += m.gimmick_count || 0;
    totals.extra += m.extra_decks || 0;
    totals.undo += m.undo_total || 0;
    totals.retry += m.retry_total || 0;
    const p = r.persona;
    if (!byPersona[p]) byPersona[p] = { wild: 0, gimmick: 0, extra: 0, undo: 0, retry: 0, levels: 0 };
    byPersona[p].wild += m.wild_count || 0;
    byPersona[p].gimmick += m.gimmick_count || 0;
    byPersona[p].extra += m.extra_decks || 0;
    byPersona[p].undo += m.undo_total || 0;
    byPersona[p].retry += m.retry_total || 0;
    byPersona[p].levels += r.levels_played || 0;
  }
  const pRows = Object.entries(byPersona).sort(([a],[b]) => a.localeCompare(b)).map(([p, d]) =>
    `<tr><td style="color:${PERSONA_COLORS[p]||'#999'}">${PERSONA_KO[p]||p}</td>
     <td>${d.wild}</td><td>${d.gimmick}</td><td>${d.extra}</td><td>${d.undo}</td><td>${d.retry}</td><td>${d.levels}</td></tr>`
  ).join('');

  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">와일드카드</div><div class="value">${totals.wild}</div></div>
      <div class="metric-box"><div class="label">기믹</div><div class="value">${totals.gimmick}</div></div>
      <div class="metric-box"><div class="label">엑스트라덱</div><div class="value">${totals.extra}</div></div>
      <div class="metric-box"><div class="label">되돌리기</div><div class="value">${totals.undo}</div></div>
      <div class="metric-box"><div class="label">재시도</div><div class="value">${totals.retry}</div></div>
    </div>
    <div class="tbl-wrap"><h4>페르소나별 아이템 사용</h4>
      <table><thead><tr><th>페르소나</th><th>와일드</th><th>기믹</th><th>엑스트라</th><th>되돌리기</th><th>재시도</th><th>총 판수</th></tr></thead>
      <tbody>${pRows}</tbody></table></div>
  `;
}

/* ── 카테고리: 스테이지 ── */
function renderCatStages(gameId, stages) {
  const byStage = {};
  for (const s of stages) {
    const key = s.stage_number || s.game_level || '?';
    if (!byStage[key]) byStage[key] = { played: 0, cleared: 0, times: [], level: s.game_level };
    byStage[key].played++;
    if (s.result === 'clear') byStage[key].cleared++;
    if (s.time_sec) byStage[key].times.push(s.time_sec);
  }
  const rows = Object.entries(byStage)
    .sort(([,a],[,b]) => (a.level||0) - (b.level||0))
    .map(([st, v]) => {
      const cr = v.played ? (v.cleared / v.played * 100).toFixed(1) : 0;
      const avgT = v.times.length ? (v.times.reduce((a,b)=>a+b,0) / v.times.length).toFixed(1) : '-';
      const badge = cr >= 90 ? 'badge-ok' : cr >= 70 ? 'badge-warn' : 'badge-err';
      return `<tr><td>${st}</td><td>Lv${v.level||'?'}</td><td>${v.played}</td><td>${v.cleared}</td>
        <td><span class="badge ${badge}">${cr}%</span></td><td>${avgT}초</td></tr>`;
    }).join('');

  return `
    <div class="tbl-wrap"><h4>스테이지별 상세 (${Object.keys(byStage).length}개)</h4>
      <table><thead><tr><th>스테이지</th><th>레벨</th><th>플레이</th><th>클리어</th><th>클리어율</th><th>평균 시간</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
  `;
}

/* ── 카테고리: 보안 QA ── */
function renderCatSecurity(gameId, runs) {
  const allChecks = [];
  let totalPass = 0, totalFail = 0;
  for (const r of runs) {
    const sec = (r.metrics || {}).security;
    if (!sec) continue;
    totalPass += sec.pass_count || 0;
    totalFail += sec.fail_count || 0;
    for (const c of (sec.checks || [])) {
      allChecks.push({ ...c, persona: r.persona, date: r.run_date });
    }
  }
  const grade = totalFail === 0 ? 'PASS' : 'FAIL';
  const gradeBadge = totalFail === 0 ? 'badge-ok' : 'badge-err';

  // 카테고리별 그룹
  const byCat = {};
  for (const c of allChecks) {
    const cat = c.category || 'etc';
    if (!byCat[cat]) byCat[cat] = { pass: 0, fail: 0, items: [] };
    if (c.pass) byCat[cat].pass++; else byCat[cat].fail++;
    if (!c.pass) byCat[cat].items.push(c);
  }

  const catSections = Object.entries(byCat).map(([cat, v]) => {
    const failItems = v.items.map(c =>
      `<div class="check-item check-fail">✗ ${c.name} — 예상: ${c.expected}, 실제: ${c.actual}</div>`
    ).join('');
    const catBadge = v.fail === 0 ? 'badge-ok' : 'badge-err';
    return `<div style="margin-bottom:12px">
      <div style="font-weight:600;margin-bottom:6px">${cat} <span class="badge ${catBadge}">${v.pass}통과 / ${v.fail}실패</span></div>
      ${failItems || '<div style="color:var(--text-muted);font-size:12px">모든 검증 통과</div>'}
    </div>`;
  }).join('');

  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">종합 등급</div><div class="value"><span class="badge ${gradeBadge}">${grade}</span></div></div>
      <div class="metric-box"><div class="label">총 검증</div><div class="value">${totalPass + totalFail}</div></div>
      <div class="metric-box"><div class="label">통과</div><div class="value" style="color:var(--status-ok)">${totalPass}</div></div>
      <div class="metric-box"><div class="label">실패</div><div class="value" style="color:${totalFail ? 'var(--status-err)' : 'var(--status-ok)'}">${totalFail}</div></div>
    </div>
    ${catSections}
  `;
}

/* ── 카테고리: 성능 ── */
function renderCatPerf(gameId, runs) {
  const perfs = runs.map(r => (r.metrics || {}).perf).filter(Boolean);
  if (!perfs.length) return '<div style="color:var(--text-muted);padding:20px">성능 데이터 없음</div>';

  const heapMax = Math.max(...perfs.map(p => p.heap_max || 0));
  const heapAvg = Math.round(perfs.reduce((a, p) => a + (p.heap_avg || 0), 0) / perfs.length);
  const domMax = Math.max(...perfs.map(p => p.dom_max || 0));
  const domAvg = Math.round(perfs.reduce((a, p) => a + (p.dom_avg || 0), 0) / perfs.length);
  const heapLimit = 3760000000; // typical Chrome limit

  const fmtMB = (v) => (v / 1048576).toFixed(1) + 'MB';
  const heapPct = Math.min(100, (heapMax / heapLimit * 100)).toFixed(1);
  const heapColor = heapPct > 70 ? 'var(--status-err)' : heapPct > 40 ? 'var(--status-warn)' : 'var(--status-ok)';

  // 메모리 추이 차트 데이터
  const allSnaps = [];
  for (const p of perfs) {
    for (const s of (p.snapshots || [])) {
      if (s.cdp) allSnaps.push({ level: s.level, tag: s.tag, heap: s.cdp.js_heap_used, dom: s.cdp.dom_nodes });
    }
  }

  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">JS Heap 최대</div><div class="value">${fmtMB(heapMax)}</div><div class="sub">평균 ${fmtMB(heapAvg)}</div></div>
      <div class="metric-box"><div class="label">DOM 노드 최대</div><div class="value">${domMax.toLocaleString()}</div><div class="sub">평균 ${domAvg.toLocaleString()}</div></div>
      <div class="metric-box"><div class="label">Heap 사용률</div><div class="value" style="color:${heapColor}">${heapPct}%</div>
        <div class="gauge-bar"><div class="gauge-fill" style="width:${heapPct}%;background:${heapColor}"></div></div></div>
      <div class="metric-box"><div class="label">스냅샷 수</div><div class="value">${allSnaps.length}</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>메모리 추이 (레벨별)</h4><canvas id="chart-heap-${gameId}"></canvas></div>
      <div class="chart-box"><h4>DOM 노드 추이</h4><canvas id="chart-dom-${gameId}"></canvas></div>
    </div>
  `;
}

function renderPerfCharts(gameId, runs) {
  const perfs = runs.map(r => (r.metrics || {}).perf).filter(Boolean);
  const allSnaps = [];
  for (const p of perfs) {
    for (const s of (p.snapshots || [])) {
      if (s.cdp) allSnaps.push({ level: s.level, tag: s.tag, heap: s.cdp.js_heap_used, dom: s.cdp.dom_nodes });
    }
  }
  if (!allSnaps.length) return;

  const labels = allSnaps.map((s, i) => `L${s.level}-${s.tag === 'level_start' ? 'S' : 'E'}`);
  const heapData = allSnaps.map(s => +(s.heap / 1048576).toFixed(1));
  const domData = allSnaps.map(s => s.dom);

  const hKey = `heap-${gameId}`;
  if (_charts[hKey]) _charts[hKey].destroy();
  _charts[hKey] = new Chart(document.getElementById(`chart-heap-${gameId}`), {
    type: 'line',
    data: { labels, datasets: [{ label: 'Heap (MB)', data: heapData, borderColor: '#3b82f6', tension: 0.3, fill: false }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
  });

  const dKey = `dom-${gameId}`;
  if (_charts[dKey]) _charts[dKey].destroy();
  _charts[dKey] = new Chart(document.getElementById(`chart-dom-${gameId}`), {
    type: 'line',
    data: { labels, datasets: [{ label: 'DOM Nodes', data: domData, borderColor: '#f59e0b', tension: 0.3, fill: false }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
  });
}

/* ── 난이도 차트 ── */
function renderDifficultyChart(gameId, stages) {
  const byDiff = {};
  for (const s of stages) {
    const d = s.difficulty || 0;
    if (!byDiff[d]) byDiff[d] = { played: 0, cleared: 0 };
    byDiff[d].played++;
    if (s.result === 'clear') byDiff[d].cleared++;
  }
  const keys = Object.keys(byDiff).sort((a, b) => +a - +b);
  const labels = keys.map(d => DIFF_TIERS[d] || 'Tier ' + d);
  const data = keys.map(d => {
    const v = byDiff[d];
    return v.played ? +(v.cleared / v.played * 100).toFixed(1) : 0;
  });
  const key = `diff-${gameId}`;
  if (_charts[key]) _charts[key].destroy();
  _charts[key] = new Chart(document.getElementById(`chart-diff-${gameId}`), {
    type: 'bar',
    data: { labels, datasets: [{ label: '클리어율', data, backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444'] }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } },
      plugins: { legend: { display: false } },
    },
  });
}

/* ── 테마/글자 크기 ── */

const FS_STEPS = [0.8, 0.9, 1.0, 1.1, 1.2, 1.35];
let fsIdx = parseInt(localStorage.getItem('db_fs_idx') || '2');

function changeFontSize(dir) {
  fsIdx = Math.max(0, Math.min(FS_STEPS.length - 1, fsIdx + dir));
  localStorage.setItem('db_fs_idx', fsIdx);
  document.documentElement.style.setProperty('--fs-scale', FS_STEPS[fsIdx]);
}

function getTheme() { return localStorage.getItem('db_theme') || 'dark'; }
function toggleTheme() {
  const t = getTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('db_theme', t);
  applyTheme(t);
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀' : '☾';
}

/* ── CSV 다운로드 ── */

function downloadCSV() {
  if (!_allRuns.length) return;
  const header = 'game_id,persona,run_date,levels_played,levels_cleared,clear_rate,total_time_sec\n';
  const rows = _allRuns.map(r =>
    `${r.game_id},${r.persona},${r.run_date},${r.levels_played},${r.levels_cleared},${r.clear_rate?.toFixed(3) || ''},${r.total_time_sec || ''}`
  ).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `freeplay_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
}

/* ── 초기화 ── */

async function init() {
  const loadingEl = document.getElementById('loading');
  const errorEl = document.getElementById('error');
  const overviewEl = document.getElementById('overview-panel');

  applyTheme(getTheme());
  document.documentElement.style.setProperty('--fs-scale', FS_STEPS[fsIdx]);

  try {
    loadingEl.style.display = 'flex';
    errorEl.style.display = 'none';
    overviewEl.style.display = 'none';

    const [runs, cron] = await Promise.all([fetchRuns(), fetchCronHistory()]);
    _allRuns = runs;

    const games = aggregateOverview(runs);
    renderOverview(games);
    renderCronHistory(cron);
    renderGameTabs(Object.keys(games));

    document.getElementById('update-time').textContent = '갱신: ' + new Date().toLocaleString('ko');
    loadingEl.style.display = 'none';
  } catch (e) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'flex';
    errorEl.innerHTML = `
      <div class="icon">⚠️</div>
      <div style="font-size:16px;font-weight:600;">데이터 로딩 실패</div>
      <div style="font-size:13px;">${e.message}</div>
      <button onclick="init()">재시도</button>
    `;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
