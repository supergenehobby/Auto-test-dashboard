<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프리플레이 통합 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
:root {
  --bg-body: #0b1120;
  --bg-card: #0f1a2e;
  --bg-topbar: #0f1a2e;
  --border: #1e3a5f;
  --text-primary: #e2e8f0;
  --text-secondary: #c8d1da;
  --text-muted: #8b9bb0;
  --status-ok: #10b981;
  --status-warn: #f59e0b;
  --status-err: #ef4444;
  --fs-scale: 1;
}
[data-theme="light"] {
  --bg-body: #f8fafc;
  --bg-card: #ffffff;
  --bg-topbar: #ffffff;
  --border: #e2e8f0;
  --text-primary: #1e293b;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg-body);
  color: var(--text-primary);
  font-size: calc(14px * var(--fs-scale));
}
a { color: #60a5fa; text-decoration: none; }

/* ── Top Bar ── */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px;
  background: var(--bg-topbar);
  border-bottom: 1px solid var(--border);
}
.logo { font-weight: 700; font-size: calc(15px * var(--fs-scale)); white-space: nowrap; }
.gtab {
  padding: 6px 18px; border: 1.5px solid var(--gc, #3b82f6); border-radius: 20px;
  background: transparent; color: var(--gc, #3b82f6);
  font-size: calc(13px * var(--fs-scale)); font-weight: 600; cursor: pointer;
  transition: background .15s, color .15s; opacity: .55;
}
.gtab.active { background: var(--gc, #3b82f6); color: #fff; opacity: 1; }
.gtab:hover:not(.active) { opacity: .9; }
.ctrl-group { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.ctrl-btn {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-card); color: var(--text-secondary);
  font-size: calc(12px * var(--fs-scale)); font-weight: 600; cursor: pointer;
}
.ctrl-btn:hover { color: var(--text-primary); border-color: var(--text-secondary); }
.ts { font-size: calc(11px * var(--fs-scale)); color: var(--text-muted); white-space: nowrap; }

/* ── Content ── */
.content { padding: 16px; max-width: 1400px; margin: 0 auto; }
.ov-summary {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 18px; margin-bottom: 16px;
  font-size: calc(13px * var(--fs-scale)); color: var(--text-secondary);
}
.ov-summary b { color: var(--text-primary); }

/* ── Cards ── */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 16px; }
.game-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; border-left: 3px solid var(--gc, #3b82f6);
}
.game-card h3 { font-size: calc(16px * var(--fs-scale)); margin-bottom: 8px; }
.game-card .stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: calc(13px * var(--fs-scale)); }
.game-card .stat-label { color: var(--text-muted); }
.game-card .stat-value { font-weight: 600; }

/* ── Charts ── */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.chart-box {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
}
.chart-box h4 { font-size: calc(14px * var(--fs-scale)); margin-bottom: 12px; color: var(--text-secondary); }
.chart-box canvas { max-height: 300px; }

/* ── Table ── */
.tbl-wrap {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; margin-bottom: 16px; overflow-x: auto;
}
.tbl-wrap h4 { font-size: calc(14px * var(--fs-scale)); margin-bottom: 12px; color: var(--text-secondary); }
table { width: 100%; border-collapse: collapse; font-size: calc(12px * var(--fs-scale)); }
th { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 600; }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--text-primary); }
td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
tr:hover td { background: rgba(59,130,246,.05); }

/* ── Loading/Error ── */
.state-msg {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; gap: 12px; color: var(--text-muted);
}
.state-msg .icon { font-size: 48px; opacity: .3; }
.state-msg button {
  margin-top: 8px; padding: 8px 20px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg-card); color: var(--text-primary); cursor: pointer; font-size: 14px;
}

/* ── Game Detail ── */
.game-detail { display: none; }
.game-detail.active { display: block; }
.persona-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 16px; }
.persona-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px;
}
.persona-card h5 { font-size: calc(13px * var(--fs-scale)); margin-bottom: 6px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-ok { background: rgba(16,185,129,.15); color: #10b981; }
.badge-warn { background: rgba(245,158,11,.15); color: #f59e0b; }
.badge-err { background: rgba(239,68,68,.15); color: #ef4444; }

/* ── Category Tabs ── */
.cat-tabs {
  display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); padding-bottom: 8px;
}
.cat-tab {
  padding: 6px 14px; border: none; border-radius: 8px 8px 0 0;
  background: transparent; color: var(--text-muted);
  font-size: calc(13px * var(--fs-scale)); font-weight: 600; cursor: pointer;
  transition: background .15s, color .15s;
}
.cat-tab.active { background: var(--bg-card); color: var(--text-primary); border-bottom: 2px solid #3b82f6; }
.cat-tab:hover:not(.active) { color: var(--text-secondary); }
.cat-panel { display: none; }
.cat-panel.active { display: block; }

/* ── Metric Row ── */
.metric-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.metric-box {
  flex: 1; min-width: 180px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
}
.metric-box .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.metric-box .value { font-size: 22px; font-weight: 700; }
.metric-box .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ── Security ── */
.check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 8px; }
.check-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
  font-size: calc(12px * var(--fs-scale));
}
.check-pass { color: var(--status-ok); }
.check-fail { color: var(--status-err); font-weight: 600; }

/* ── Perf ── */
.perf-gauge { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.gauge-box {
  flex: 1; min-width: 200px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
}
.gauge-bar { height: 8px; border-radius: 4px; background: var(--border); margin-top: 8px; overflow: hidden; }
.gauge-fill { height: 100%; border-radius: 4px; transition: width .3s; }

/* ── Run Manager ── */
.rm-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
.rm-row:hover { background: rgba(59,130,246,.05); }
.rm-row input[type="checkbox"] { cursor: pointer; }
.rm-date-filter { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; font-size: 12px; }
.rm-date-filter input[type="date"] { padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-card); color: var(--text-secondary); font-size: 12px; }
.rm-actions { display: flex; gap: 8px; margin-top: 10px; }
.rm-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text-secondary); font-size: 12px; cursor: pointer; }
.rm-btn:hover { border-color: var(--text-secondary); color: var(--text-primary); }
.rm-btn-danger { border-color: #ef4444; color: #ef4444; }
.rm-btn-danger:hover { background: #ef444422; }

/* ── Layout Editor ── */
.edit-mode .layout-section {
  border: 2px dashed var(--border); border-radius: 8px; padding: 4px; margin-bottom: 8px;
  cursor: grab; position: relative;
}
.edit-mode .layout-section:active { cursor: grabbing; }
.edit-mode .layout-section .section-handle {
  display: flex; align-items: center; gap: 6px; padding: 4px 8px;
  background: rgba(59,130,246,.1); border-radius: 6px; margin-bottom: 4px;
  font-size: 11px; color: var(--text-muted); cursor: grab;
}
.section-handle { display: none; }
.edit-mode .section-toggle {
  display: inline-block; margin-left: auto; cursor: pointer;
  padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary);
}
.section-toggle { display: none; }
.layout-section.hidden-section > *:not(.section-handle) { display: none; }
.layout-section.hidden-section { opacity: 0.4; }
.sortable-ghost { opacity: 0.3; }
.edit-bar {
  display: none; padding: 8px 16px; background: rgba(59,130,246,.08);
  border-bottom: 1px solid var(--border); font-size: 12px;
  align-items: center; gap: 8px; color: var(--text-secondary);
}
.edit-bar.active { display: flex; }

/* ── Difficulty Color Coding ── */
.diff-normal { color: var(--status-ok); }
.diff-hard { color: var(--status-warn); }
.diff-superhard { color: var(--status-err); }

/* ── Gauge Bar (Perf) ── */
.leak-gauge { height: 24px; border-radius: 6px; background: var(--border); overflow: hidden; position: relative; margin: 8px 0; }
.leak-gauge-fill { height: 100%; border-radius: 6px; transition: width .3s; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }

@media (max-width: 768px) {
  .cards { grid-template-columns: 1fr; }
  .chart-grid { grid-template-columns: 1fr; }
  .persona-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
  <div class="top-bar">
    <span class="logo">🎮 통합 대시보드</span>
    <div id="game-tabs"></div>
    <div class="ctrl-group">
      <button class="ctrl-btn" onclick="changeFontSize(-1)" title="글자 축소">A-</button>
      <button class="ctrl-btn" onclick="changeFontSize(1)" title="글자 확대">A+</button>
      <button class="ctrl-btn" id="themeBtn" onclick="toggleTheme()" title="테마 전환">☀</button>
      <button class="ctrl-btn" onclick="downloadCSV()" title="CSV 다운로드">CSV</button>
      <button class="ctrl-btn" id="editBtn" onclick="toggleEditMode()" title="레이아웃 편집">Edit</button>
      <span class="ts" id="update-time"></span>
    </div>
  </div>

  <div class="edit-bar" id="editBar">
    <span>📐 레이아웃 편집 모드 — 섹션을 드래그하여 순서 변경, 👁 버튼으로 표시/숨기기</span>
    <button class="ctrl-btn" onclick="resetLayout()" style="margin-left:auto">초기화</button>
    <button class="ctrl-btn" onclick="toggleEditMode()" style="background:#3b82f6;color:#fff">완료</button>
  </div>
  <div class="content">
    <div id="loading" class="state-msg">
      <div class="icon">⏳</div>
      <div>데이터 로딩 중...</div>
    </div>
    <div id="error" class="state-msg" style="display:none"></div>
    <div id="overview-panel" style="display:none"></div>
    <div id="game-panels"></div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════
   Supabase 실시간 대시보드
   ═══════════════════════════════════════════════════════ */

/* ── Chart.js 글로벌 다크 테마 설정 ── */
Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = '#1e3a5f';

const SUPABASE_URL = 'https://lxkvjwnhrqbtaglwkgmf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_d_sWb1OmWgs0oKrWPCxr5g_ARo_7kq7';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PERSONA_ORDER = ['hardcore', 'average', 'casual', 'struggling'];
const PERSONA_KO = { hardcore: '고수', average: '중수', casual: '하수', struggling: '초보' };
const PERSONA_COLORS = { hardcore: '#3b82f6', average: '#10b981', casual: '#f59e0b', struggling: '#ef4444' };
function _sortPersona(entries) { return entries.sort(([a],[b]) => (PERSONA_ORDER.indexOf(a)===-1?99:PERSONA_ORDER.indexOf(a)) - (PERSONA_ORDER.indexOf(b)===-1?99:PERSONA_ORDER.indexOf(b))); }
const DIFF_TIERS = { 1: '튜토리얼', 2: '노말', 3: '하드', 4: '슈퍼하드' };
const DIFF_COLORS = { 1: '#10b981', 2: '#10b981', 3: '#f59e0b', 4: '#ef4444' };

let _allRuns = [];
let _charts = {};
let _gameConfigs = [];

/* ── 데이터 Fetch ── */

async function fetchRuns() {
  const { data, error } = await sb
    .from('freeplay_runs')
    .select('*')
    .order('run_date', { ascending: false });
  if (error) throw error;
  return data || [];
}

async function fetchCronHistory() {
  const { data, error } = await sb
    .from('cron_history')
    .select('*')
    .order('run_date', { ascending: false })
    .limit(30);
  if (error) throw error;
  return data || [];
}

async function fetchStages(gameId) {
  const { data, error } = await sb
    .from('stage_results')
    .select('*')
    .eq('game_id', gameId)
    .order('created_at', { ascending: false })
    .limit(2000);
  if (error) throw error;
  return data || [];
}

async function fetchGameConfigs() {
  const { data, error } = await sb.from('game_config').select('*');
  if (error) throw error;
  return data || [];
}

/* ── 집계 ── */

function aggregateOverview(runs) {
  const games = {};
  for (const r of runs) {
    if (!games[r.game_id]) {
      games[r.game_id] = { runs: 0, levels: 0, time: 0, personas: {}, dailyMap: {}, issueCount: 0, events: [] };
    }
    const g = games[r.game_id];
    g.runs++;
    g.levels += r.levels_played || 0;
    g.time += r.total_time_sec || 0;

    const p = r.persona;
    if (!g.personas[p]) g.personas[p] = { played: 0, runs: 0, lastDate: '' };
    g.personas[p].played += r.levels_played || 0;
    g.personas[p].runs++;
    if (r.run_date > g.personas[p].lastDate) g.personas[p].lastDate = r.run_date;

    const d = r.run_date;
    if (!g.dailyMap[d]) g.dailyMap[d] = { levels: 0, runs: 0 };
    g.dailyMap[d].levels += r.levels_played || 0;
    g.dailyMap[d].runs++;

    const m = r.metrics || {};
    g.issueCount += (m.issues || []).length;
  }
  return games;
}

/* ── 렌더링: 종합 탭 ── */

function renderOverview(games) {
  const panel = document.getElementById('overview-panel');
  const totalLevels = Object.values(games).reduce((a, g) => a + g.levels, 0);
  const totalRuns = Object.values(games).reduce((a, g) => a + g.runs, 0);
  const totalTime = Object.values(games).reduce((a, g) => a + g.time, 0);
  const timeStr = totalTime >= 3600
    ? `${(totalTime / 3600).toFixed(1)}시간`
    : `${Math.round(totalTime / 60)}분`;

  panel.innerHTML = `
    <div class="ov-summary">
      <b>전체 현황</b> &nbsp;·&nbsp;
      게임 <b>${Object.keys(games).length}종</b> &nbsp;·&nbsp;
      총 런 <b>${totalRuns}</b> &nbsp;·&nbsp;
      총 판 <b>${totalLevels.toLocaleString()}</b> &nbsp;·&nbsp;
      총 <b>${timeStr}</b>
    </div>
    <div class="cards">${Object.entries(games).map(([gid, g]) => renderGameCard(gid, g)).join('')}</div>
    <div class="chart-grid">
      <div class="chart-box"><h4>게임별 판당 평균 시간</h4><canvas id="chart-avg-time"></canvas></div>
      <div class="chart-box"><h4>일별 런 수 추이</h4><canvas id="chart-daily-runs"></canvas></div>
    </div>
    <div class="tbl-wrap"><h4>이슈 요약 (총 ${Object.values(games).reduce((a,g) => a + g.issueCount, 0)}건)</h4>
      ${Object.entries(games).map(([gid, g]) => {
        const color = g.issueCount > 0 ? 'var(--status-warn)' : 'var(--status-ok)';
        const text = g.issueCount > 0 ? `${g.issueCount}건` : '이슈 없음';
        return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
          <span style="font-weight:600;min-width:40px;">${gid}</span>
          <span style="color:${color}">${text}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="tbl-wrap"><h4>테스트 커버리지</h4>
      ${Object.entries(games).map(([gid, g]) => {
        const pList = Object.entries(g.personas).sort(([a],[b]) => (PERSONA_ORDER.indexOf(a)===-1?99:PERSONA_ORDER.indexOf(a)) - (PERSONA_ORDER.indexOf(b)===-1?99:PERSONA_ORDER.indexOf(b)))
          .map(([p, d]) => `${PERSONA_KO[p]||p} ${d.runs}`).join(' / ');
        const lastDate = Object.values(g.personas).reduce((mx, d) => d.lastDate > mx ? d.lastDate : mx, '');
        return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
          <span style="font-weight:600;min-width:40px;">${gid}</span>
          <span style="color:var(--text-secondary)">${g.runs}런 (${pList})</span>
          <span style="color:var(--text-muted);margin-left:auto">최근 ${lastDate ? lastDate.slice(5) : '-'}</span>
        </div>`;
      }).join('')}
    </div>
    <div id="cron-section"></div>
    <div id="run-manager"></div>
  `;
  panel.style.display = 'block';
  renderRunManager(_allRuns);

  renderAvgTimeChart(games);
  renderDailyRunsChart(games);
}

function renderAvgTimeChart(games) {
  const gameIds = Object.keys(games);
  const colors = gameIds.map((_, i) => Object.values(PERSONA_COLORS)[i % 4]);
  const data = gameIds.map(gid => {
    const g = games[gid];
    return g.levels ? +(g.time / g.levels).toFixed(1) : 0;
  });
  if (_charts.avgTime) _charts.avgTime.destroy();
  _charts.avgTime = new Chart(document.getElementById('chart-avg-time'), {
    type: 'bar',
    data: {
      labels: gameIds,
      datasets: [{ label: '판당 평균 시간 (초)', data, backgroundColor: colors.map(c => c + '99'), borderColor: colors, borderWidth: 1.5, borderRadius: 6 }],
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.raw.toFixed(1) + '초' } } },
      scales: { x: { ticks: { callback: v => v + 's' } } },
    },
  });
}

function renderDailyRunsChart(games) {
  const allDates = new Set();
  Object.values(games).forEach(g => Object.keys(g.dailyMap).forEach(d => allDates.add(d)));
  const dates = [...allDates].sort();
  const gameIds = Object.keys(games);

  const datasets = gameIds.map((gid, i) => ({
    label: gid,
    data: dates.map(d => {
      const dd = games[gid].dailyMap[d];
      return dd ? dd.runs : 0;
    }),
    borderColor: Object.values(PERSONA_COLORS)[i % 4],
    tension: 0.3, fill: false, spanGaps: true,
  }));

  if (_charts.dailyRuns) _charts.dailyRuns.destroy();
  _charts.dailyRuns = new Chart(document.getElementById('chart-daily-runs'), {
    type: 'line',
    data: { labels: dates.map(d => d.slice(5)), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { beginAtZero: true } },
      plugins: { legend: { labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary') } } },
    },
  });
}

function renderGameCard(gid, g) {
  const timeStr = g.time >= 3600
    ? `${(g.time / 3600).toFixed(1)}시간`
    : `${Math.round(g.time / 60)}분`;

  const personaRows = Object.entries(g.personas)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([p, d]) => {
      return `<div class="stat"><span class="stat-label">${PERSONA_KO[p] || p}</span><span class="stat-value">${d.played}판 (${d.runs}런)</span></div>`;
    }).join('');

  return `
    <div class="game-card" style="--gc:${PERSONA_COLORS.hardcore}">
      <h3>${gid}</h3>
      <div class="stat"><span class="stat-label">총 런/판</span><span class="stat-value">${g.runs}런 / ${g.levels.toLocaleString()}판</span></div>
      <div class="stat"><span class="stat-label">소요시간</span><span class="stat-value">${timeStr}</span></div>
      ${personaRows}
    </div>
  `;
}

function renderCronHistory(cron) {
  if (!cron || !cron.length) return;
  const section = document.getElementById('cron-section');

  // 모든 게임 ID 수집
  const gameIds = new Set();
  for (const c of cron) {
    for (const g of Object.keys(c.results || {})) gameIds.add(g);
  }
  const games = [...gameIds].sort();

  const gameHeaders = games.map(g => `<th>${g}</th>`).join('');
  const rows = cron.map(c => {
    const res = c.results || {};
    const startTime = c.started_at ? new Date(c.started_at).toLocaleTimeString('ko', {hour:'2-digit', minute:'2-digit'}) : '-';
    const endTime = c.finished_at ? new Date(c.finished_at).toLocaleTimeString('ko', {hour:'2-digit', minute:'2-digit'}) : '-';
    const gameCells = games.map(g => {
      const r = res[g];
      if (!r) return '<td style="color:var(--text-muted)">-</td>';

      const color = ok ? 'var(--status-ok)' : 'var(--status-err)';
      const label = ok ? 'OK' : `FAIL (${r.exit_code})`;
      return `<td style="color:${color}">${label}</td>`;
    }).join('');
    return `<tr>
      <td><input type="checkbox" class="cron-check" value="${c.id}"></td>
      <td>${c.run_date}</td>
      <td>${startTime}</td>
      <td>${endTime}</td>
      <td>${c.levels_target || '-'}</td>
      ${gameCells}
      <td>${c.duration_min || '-'}분</td>

  }).join('');

  section.innerHTML = `
    <div class="tbl-wrap">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <h4 style="margin:0">크론 실행 이력</h4>
        <label style="font-size:11px;color:var(--text-muted);margin-left:auto"><input type="checkbox" id="cron-select-all" onclick="document.querySelectorAll('.cron-check').forEach(c=>c.checked=this.checked)"> 전체 선택</label>
        <button class="rm-btn rm-btn-danger" onclick="deleteSelectedCron()" style="font-size:11px;padding:3px 10px">선택 삭제</button>
        <span id="cron-status" style="font-size:11px;color:var(--text-muted)"></span>
      </div>
      <table>
        <thead><tr><th style="width:30px"></th><th>날짜</th><th>시작</th><th>종료</th><th>목표</th>${gameHeaders}<th>소요</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

/* ── 카테고리 전환 시 lazy 차트 렌더링에 사용할 캐시 ── */
let _currentGameStages = [];
let _currentGameRuns = [];
let _currentGameId = '';
let _renderedCats = {};

async function switchTab(id, btn) {
  document.querySelectorAll('.gtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const overview = document.getElementById('overview-panel');
  const panels = document.getElementById('game-panels');

  if (id === 'overview') {
    overview.style.display = 'block';
    panels.innerHTML = '';
    _currentGameId = '';
    _renderedCats = {};
    return;
  }

  overview.style.display = 'none';
  panels.innerHTML = '<div class="state-msg"><div class="icon">⏳</div><div>게임 데이터 로딩 중...</div></div>';

  try {
    const stages = await fetchStages(id);
    const gameRuns = _allRuns.filter(r => r.game_id === id);
    _currentGameStages = stages;
    _currentGameRuns = gameRuns;
    _currentGameId = id;
    _renderedCats = {};
    panels.innerHTML = renderGameDetail(id, stages, gameRuns);
    // 요약 탭은 즉시 렌더
    setTimeout(() => {
      renderSummaryCharts(id, stages, gameRuns);
      renderRadarChart(id, stages, gameRuns);
      _renderedCats['summary'] = true;
    }, 50);
  } catch (e) {
    panels.innerHTML = `<div class="state-msg"><div class="icon">⚠️</div><div>${id} 데이터 로딩 실패: ${e.message}</div></div>`;
  }
}

/* ── 카테고리별 렌더러 매핑 ── */
const CATEGORY_RENDERERS = {
  // 공통
  summary: (gid, stages, runs) => renderCatSummary(gid, stages, runs),
  stages: (gid, stages, runs) => renderCatStages(gid, stages),
  security: (gid, stages, runs) => renderCatSecurity(gid, runs),
  logapi: (gid, stages, runs) => renderCatLogApi(gid, runs),
  perf: (gid, stages, runs) => renderCatPerf(gid, runs),
  // SCJ 전용
  economy: (gid, stages, runs) => renderCatEconomy(gid, runs),
  balance: (gid, stages, runs) => renderCatBalance(gid, stages, runs),
  gimmick: (gid, stages, runs) => renderCatGimmick(gid, stages, runs),
  // CTZ 전용
  tiles: (gid, stages, runs) => renderCatTiles(gid, stages, runs),
  items: (gid, stages, runs) => renderCatCtzItems(gid, stages, runs),
  time_analysis: (gid, stages, runs) => renderCatTimeAnalysis(gid, stages, runs),
};

const CHART_RENDERERS = {
  summary: (id, stages, runs) => { renderSummaryCharts(id, stages, runs); renderRadarChart(id, stages, runs); },
  economy: (id, stages, runs) => renderEconomyCharts(id, stages, runs),
  balance: (id, stages, runs) => renderBalanceCharts(id, stages, runs),
  gimmick: (id, stages, runs) => renderGimmickCharts(id, stages),
  // CTZ
  tiles: (id, stages, runs) => renderTileCharts(id, stages, runs),
  time_analysis: (id, stages, runs) => renderTimeCharts(id, stages, runs),
  perf: (id, stages, runs) => renderPerfCharts(id, runs),
};

function renderGameDetail(gameId, stages, runs) {
  const config = _gameConfigs.find(c => c.game_id === gameId);
  const cats = config ? config.config.categories : [{ id: 'summary', label: '📊 요약' }];

  const tabsHtml = cats.map((c, i) =>
    `<button class="cat-tab${i === 0 ? ' active' : ''}" onclick="switchCat('${gameId}','${c.id}',this)">${c.label}</button>`
  ).join('');

  const panelsHtml = cats.map((c, i) => {
    const renderer = CATEGORY_RENDERERS[c.id];
    const content = renderer ? renderer(gameId, stages, runs) : `<div style="color:var(--text-muted);padding:20px">${c.label} 준비 중</div>`;
    return `<div id="cat-${c.id}-${gameId}" class="cat-panel${i === 0 ? ' active' : ''}">${content}</div>`;
  }).join('');

  return `
    <div class="cat-tabs">${tabsHtml}</div>

function switchCat(gameId, catId, btn) {
  btn.parentElement.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`[id^="cat-"][id$="-${gameId}"]`).forEach(p => p.classList.remove('active'));
  document.getElementById(`cat-${catId}-${gameId}`).classList.add('active');

  // lazy 차트 렌더링
  if (!_renderedCats[catId] && _currentGameId === gameId) {
    setTimeout(() => {
      const chartRenderer = CHART_RENDERERS[catId];
      if (chartRenderer) {
        chartRenderer(gameId, _currentGameStages, _currentGameRuns);
      }
      _renderedCats[catId] = true;
    }, 50);
  }
}

/* ══════════════════════════════════════════════
   페르소나 스테이지 집계 (공통)
   ══════════════════════════════════════════════ */
function _aggregatePersonaStages(stages) {
  const pAgg = {};
  for (const s of stages) {
    const p = s.persona;
    const d = s.details || {};
    if (!pAgg[p]) pAgg[p] = { played: 0, reward: 0, cost: 0, goldPnl: 0, turns: 0, turnN: 0,
      matches: 0, draws: 0, gimmicks: 0, plusCards: 0, gimmickTypes: {},
      wildMatches: 0, wildBuys: 0, wildCost: 0, extraDecks: 0,
      streakGold: 0, missDraws: 0, combos: 0, betting: {}, ddaCount: 0 };
    const a = pAgg[p];
    a.played++;
    a.reward += (d.level_reward || 0);
    a.cost += (d.entry_fee || 0) + (d.item_cost || 0);
    a.goldPnl += d.gold_pnl || 0;
    if (d.turns) { a.turns += d.turns; a.turnN++; }
    a.matches += d.matches || 0;
    a.draws += d.draws || 0;
    // 기믹: events에서 기믹 타입 존재 여부 추출 (gimmick:/gimmick_match: 인식 + plus_card_count로 플러스카드 감지, Set 중복 제거)
    const evts = d.events || [];
    const gimmickPresent = new Set();
    for (const e of evts) {
      if (typeof e !== 'string') continue;
      if (e.startsWith('gimmick_match:')) gimmickPresent.add(e.slice(14).split(' (')[0].trim());
      else if (e.startsWith('gimmick:')) gimmickPresent.add(e.slice(8).split(' (')[0].trim());
    }
    if (d.plus_card_count > 0) gimmickPresent.add('플러스카드');
    a.gimmicks += gimmickPresent.size; // 이 판에 배치된 기믹 종류 수
    for (const name of gimmickPresent) {
      // 이름 → 코드 역매핑
      const code = Object.entries(GIMMICK_NAMES).find(([k,v]) => v === name)?.[0] || name;
      a.gimmickTypes[code] = (a.gimmickTypes[code] || 0) + 1; // 해당 기믹이 배치된 맵 수
    }
    a.plusCards += d.plus_card_count || 0;
    a.wildMatches += d.wild_card_count || 0;
    a.wildBuys += (d.item_cost && d.wild_card_count) ? d.wild_card_count : 0;
    a.wildCost += d.item_cost || 0;
    a.extraDecks += d.extra_decks || 0;
    a.streakGold += d.streak_gold || 0;
    a.missDraws += d.miss_draw ? 1 : 0;
    a.combos += d.combo_count || 0;
    if (d.dda_adjusted) a.ddaCount++;
    const bm = String(d.betting_multiplier || 1);
    if (!a.betting[bm]) a.betting[bm] = { count: 0, goldPnl: 0 };
    a.betting[bm].count++;
    a.betting[bm].goldPnl += d.gold_pnl || 0;
  }
  return pAgg;
}

/* ══════════════════════════════════════════════
   카테고리: 요약
   ══════════════════════════════════════════════ */
function renderCatSummary(gameId, stages, runs) {
  const personas = {};
  let totalGoldPnl = 0, totalHammerDelta = 0, totalTurns = 0, turnCount = 0;
  let totalScore = 0, totalContinues = 0;
  for (const r of runs) {
    const m = r.metrics || {};
    if (!personas[r.persona]) personas[r.persona] = { played: 0, runs: 0, time: 0, goldPnl: 0, hammer: 0, turns: 0, turnLevels: 0, score: 0, continues: 0 };
    const p = personas[r.persona];
    p.played += r.levels_played || 0;
    p.runs++;
    p.time += r.total_time_sec || 0;
    p.goldPnl += m.gold_pnl || 0;
    p.hammer += m.hammer_delta || 0;
    p.score += m.total_score || 0;
    p.continues += m.continues || 0;
    totalGoldPnl += m.gold_pnl || 0;
    totalHammerDelta += m.hammer_delta || 0;
    totalScore += m.total_score || 0;
    totalContinues += m.continues || 0;
  }
  for (const s of stages) {
    const t = (s.details || {}).turns;
    if (t) { totalTurns += t; turnCount++; }
    const pp = personas[s.persona];
    if (pp && t) { pp.turns += t; pp.turnLevels++; }
  }
  const totalPlayed = Object.values(personas).reduce((a, p) => a + p.played, 0);
  const totalTime = Object.values(personas).reduce((a, p) => a + p.time, 0);
  const avgTurns = turnCount ? (totalTurns / turnCount).toFixed(1) : '-';

  /* 게임별 상단 메트릭 */
  let topMetrics;
  if (gameId === 'CTZ') {
    const avgScore = totalPlayed ? Math.round(totalScore / totalPlayed).toLocaleString() : '-';
    const avgTime = totalPlayed ? (totalTime / totalPlayed).toFixed(1) : '-';
    topMetrics = `
      <div class="metric-box"><div class="label">평균 점수</div><div class="value">${avgScore}</div></div>
      <div class="metric-box"><div class="label">이어하기</div><div class="value">${totalContinues}</div></div>
      <div class="metric-box"><div class="label">판당 평균 시간</div><div class="value">${avgTime}초</div></div>
      <div class="metric-box"><div class="label">총 플레이</div><div class="value">${totalPlayed.toLocaleString()}판</div></div>
      <div class="metric-box"><div class="label">총 런</div><div class="value">${runs.length}</div></div>`;
  } else {
    const goldPerGame = totalPlayed ? Math.round(totalGoldPnl / totalPlayed).toLocaleString() : '-';
    const goldColor = totalGoldPnl >= 0 ? 'var(--status-ok)' : 'var(--status-err)';
    topMetrics = `
      <div class="metric-box"><div class="label">골드 손익/판</div><div class="value" style="color:${goldColor}">${goldPerGame}</div></div>
      <div class="metric-box"><div class="label">평균 턴수</div><div class="value">${avgTurns}</div></div>
      <div class="metric-box"><div class="label">해머 변동</div><div class="value">${totalHammerDelta >= 0 ? '+' : ''}${totalHammerDelta}</div></div>
      <div class="metric-box"><div class="label">총 플레이</div><div class="value">${totalPlayed.toLocaleString()}판</div></div>
      <div class="metric-box"><div class="label">총 런</div><div class="value">${runs.length}</div></div>`;
  }

  /* 게임별 페르소나 카드 */
  const personaCards = Object.entries(personas).sort(([a],[b]) => (PERSONA_ORDER.indexOf(a)===-1?99:PERSONA_ORDER.indexOf(a)) - (PERSONA_ORDER.indexOf(b)===-1?99:PERSONA_ORDER.indexOf(b))).map(([p, d]) => {
    const avgTime = d.played ? (d.time / d.played).toFixed(1) : 0;
    let statsHtml;
    if (gameId === 'CTZ') {
      const pScore = d.played ? Math.round(d.score / d.played).toLocaleString() : '-';
      statsHtml = `
        <div class="stat"><span class="stat-label">판 수</span><span class="stat-value">${d.played}판 (${d.runs}런)</span></div>
        <div class="stat"><span class="stat-label">평균 점수</span><span class="stat-value">${pScore}</span></div>
        <div class="stat"><span class="stat-label">이어하기</span><span class="stat-value">${d.continues}</span></div>
        <div class="stat"><span class="stat-label">평균 시간</span><span class="stat-value">${avgTime}초</span></div>`;
    } else {
      const pGold = d.played ? Math.round(d.goldPnl / d.played).toLocaleString() : '-';
      const pGoldColor = d.goldPnl >= 0 ? 'var(--status-ok)' : 'var(--status-err)';
      const pTurns = d.turnLevels ? (d.turns / d.turnLevels).toFixed(1) : '-';
      const pHammer = d.hammer >= 0 ? `+${d.hammer}` : d.hammer;
      statsHtml = `
        <div class="stat"><span class="stat-label">판 수</span><span class="stat-value">${d.played}판 (${d.runs}런)</span></div>
        <div class="stat"><span class="stat-label">골드 손익/판</span><span class="stat-value" style="color:${pGoldColor}">${pGold}</span></div>
        <div class="stat"><span class="stat-label">평균 턴수</span><span class="stat-value">${pTurns}</span></div>
        <div class="stat"><span class="stat-label">평균 시간</span><span class="stat-value">${avgTime}초</span></div>
        <div class="stat"><span class="stat-label">해머 변동</span><span class="stat-value">${pHammer}</span></div>`;
    }
    return `<div class="persona-card">
      <h5 style="color:${PERSONA_COLORS[p] || '#999'}">${PERSONA_KO[p] || p}</h5>
      ${statsHtml}
    </div>`;
  }).join('');

  return `
    <div class="metric-row">${topMetrics}</div>
    <div class="persona-grid">${personaCards}</div>
    <div class="chart-grid">
      <div class="chart-box"><h4>일별 런 수 추이</h4><canvas id="chart-summary-dailyruns-${gameId}"></canvas></div>
      <div class="chart-box" style="margin-top:0"><h4>페르소나 종합 비교</h4><canvas id="chart-radar-${gameId}"></canvas></div>
    </div>
  `;
}

/* 요약 탭 전용 차트 */
function renderSummaryCharts(gameId, stages, runs) {
  // 일별 런 수 추이 (게임 상세)
  const dailyMap = {};
  for (const r of runs) {
    const d = r.run_date;
    if (!dailyMap[d]) dailyMap[d] = {};
    if (!dailyMap[d][r.persona]) dailyMap[d][r.persona] = 0;
    dailyMap[d][r.persona]++;
  }
  const dates = Object.keys(dailyMap).sort();
  const allPersonas = [...new Set(runs.map(r => r.persona))].sort();
  const dRunDs = allPersonas.map(p => ({
    label: PERSONA_KO[p] || p,
    data: dates.map(d => dailyMap[d][p] || 0),
    borderColor: PERSONA_COLORS[p] || '#999',
    backgroundColor: (PERSONA_COLORS[p] || '#999') + '33',
    tension: 0.3, fill: true,
  }));
  const drKey = `summary-dailyruns-${gameId}`;
  if (_charts[drKey]) _charts[drKey].destroy();
  const drCanvas = document.getElementById(`chart-summary-dailyruns-${gameId}`);
  if (drCanvas) {
    _charts[drKey] = new Chart(drCanvas, {
      type: 'line',
      data: { labels: dates.map(d => d.slice(5)), datasets: dRunDs },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
        plugins: { legend: { labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary') } } },
      },
    });
  }
}

const GIMMICK_NAMES = { '2': '키&자물쇠', '5': '와일드', '6': '얼음', '9': '러너', 'plus': '플러스카드' };
const GIMMICK_WEIGHTS = { '키&자물쇠': +20, '얼음': +30, '러너': +40, '플러스카드': -10 };
const GIMMICK_MAX = { '키&자물쇠': 4, '얼음': 8, '러너': 8, '플러스카드': 3 };

function renderRadarChart(gameId, stages, runs) {
  const personas = {};
  for (const r of runs) {
    const m = r.metrics || {};
    if (!personas[r.persona]) personas[r.persona] = { played: 0, time: 0, goldPnl: 0, turns: 0, turnLevels: 0, score: 0, continues: 0 };
    const p = personas[r.persona];
    p.played += r.levels_played || 0;
    p.time += r.total_time_sec || 0;
    p.goldPnl += m.gold_pnl || 0;
    p.score += m.total_score || 0;
    p.continues += m.continues || 0;
  }
  for (const s of stages) {
    const t = (s.details || {}).turns;
    if (t && personas[s.persona]) { personas[s.persona].turns += t; personas[s.persona].turnLevels++; }
  }

  const pKeys = Object.keys(personas).sort();
  if (!pKeys.length) return;

  let radarLabels, metrics;
  if (gameId === 'CTZ') {
    radarLabels = ['속도', '점수', '아이템 활용', '볼륨'];
    metrics = pKeys.map(p => {
      const d = personas[p];
      const avgScore = d.played ? d.score / d.played : 0;
      const itemRate = d.played ? d.continues / d.played : 0;
      return {
        v1: d.played ? Math.max(0, 100 - (d.time / d.played)) : 0,
        v2: Math.min(100, avgScore / 50),
        v3: Math.min(100, itemRate * 100),
        v4: Math.min(100, d.played * 2),
      };
    });
  } else {
    radarLabels = ['속도', '턴 효율', '경제성', '볼륨'];
    metrics = pKeys.map(p => {
      const d = personas[p];
      return {
        v1: d.played ? Math.max(0, 100 - (d.time / d.played)) : 0,
        v2: d.turnLevels ? Math.max(0, 100 - (d.turns / d.turnLevels - 20)) : 0,
        v3: d.played ? Math.min(100, Math.max(0, 50 + d.goldPnl / d.played / 200)) : 50,
        v4: Math.min(100, d.played * 2),
      };
    });
  }

  const datasets = pKeys.map((p, i) => ({
    label: PERSONA_KO[p] || p,
    data: [metrics[i].v1, metrics[i].v2, metrics[i].v3, metrics[i].v4],
    borderColor: PERSONA_COLORS[p] || '#999',
    backgroundColor: (PERSONA_COLORS[p] || '#999') + '22',
    pointBackgroundColor: PERSONA_COLORS[p] || '#999',
  }));

  const key = `radar-${gameId}`;
  if (_charts[key]) _charts[key].destroy();
  const radarCanvas = document.getElementById(`chart-radar-${gameId}`);
  if (radarCanvas) {
    _charts[key] = new Chart(radarCanvas, {
      type: 'radar',
      data: { labels: radarLabels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { r: { beginAtZero: true, max: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,.1)' } } },
        plugins: { legend: { labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary') } } },
      },
    });
  }
}

/* ══════════════════════════════════════════════
   카테고리: 경제
   ══════════════════════════════════════════════ */
function renderCatEconomy(gameId, runs) {
  let totalGoldPnl = 0, totalHammerDelta = 0;
  const rows = runs.map(r => {
    const m = r.metrics || {};
    totalGoldPnl += m.gold_pnl || 0;
    totalHammerDelta += m.hammer_delta || 0;
    const goldColor = (m.gold_pnl || 0) >= 0 ? 'var(--status-ok)' : 'var(--status-err)';
    return `<tr>
      <td>${r.run_date}</td><td>${PERSONA_KO[r.persona] || r.persona}</td>
      <td style="color:${goldColor}">${(m.gold_pnl || 0).toLocaleString()}</td>
      <td>${(m.hammer_delta || 0).toLocaleString()}</td>
      <td>${(m.gold_start || 0).toLocaleString()}</td><td>${(m.gold_end || 0).toLocaleString()}</td>
    </tr>`;
  }).join('');

  const goldColor = totalGoldPnl >= 0 ? 'var(--status-ok)' : 'var(--status-err)';
  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">총 골드 수익</div><div class="value" style="color:${goldColor}">${totalGoldPnl.toLocaleString()}</div></div>
      <div class="metric-box"><div class="label">총 해머 변동</div><div class="value">${totalHammerDelta.toLocaleString()}</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>골드 회수율 (%)</h4><canvas id="chart-eff-${gameId}"></canvas></div>
      <div class="chart-box"><h4>골드 손익 /판</h4><canvas id="chart-gpnl-${gameId}"></canvas></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>배팅 배수별 골드 손익 /판</h4><canvas id="chart-bet-${gameId}"></canvas></div>
      <div class="chart-box"><h4>페르소나별 골드 잔액 추이</h4><canvas id="chart-goldbal-${gameId}"></canvas></div>
    </div>
    <div class="chart-grid" style="grid-template-columns:1fr 1fr">
      <div class="chart-box"><h4>와일드 비용 /판</h4><canvas id="chart-wild-${gameId}"></canvas></div>
      <div class="chart-box"><h4>스트릭 보너스 /판</h4><canvas id="chart-streak-${gameId}"></canvas></div>
    </div>
    <div class="tbl-wrap"><h4>런별 경제 상세</h4>
      <table><thead><tr><th>날짜</th><th>페르소나</th><th>골드 PnL</th><th>해머</th><th>골드 시작</th><th>골드 종료</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
  `;
}

/* 경제 탭 차트 렌더링 */
function renderEconomyCharts(gameId, stages, runs) {
  const pAgg = _aggregatePersonaStages(stages);
  const pKeys = Object.keys(pAgg).sort((a,b) => (PERSONA_ORDER.indexOf(a)===-1?99:PERSONA_ORDER.indexOf(a)) - (PERSONA_ORDER.indexOf(b)===-1?99:PERSONA_ORDER.indexOf(b)));
  const labels = pKeys.map(p => PERSONA_KO[p] || p);
  const colors = pKeys.map(p => PERSONA_COLORS[p] || '#999');

  // 골드 회수율
  const effData = pKeys.map(p => {
    const a = pAgg[p];
    return a.cost > 0 ? +((a.reward / a.cost) * 100).toFixed(1) : 0;
  });
  _chartBar(gameId, 'eff', labels, colors, effData, '%', '회수율');

  // 골드 손익/판
  const gpnlData = pKeys.map(p => {
    const a = pAgg[p];
    return a.played ? Math.round(a.goldPnl / a.played) : 0;
  });
  _chartBar(gameId, 'gpnl', labels, colors, gpnlData, '', '손익/판');

  // 배팅 배수별 골드 손익/판
  const allMults = new Set();
  for (const p of pKeys) { Object.keys(pAgg[p].betting).forEach(m => allMults.add(m)); }
  const multKeys = [...allMults].sort((a, b) => +a - +b);
  const betDatasets = pKeys.map((p, i) => ({
    label: PERSONA_KO[p] || p,
    data: multKeys.map(m => {
      const b = pAgg[p].betting[m];
      return b && b.count ? Math.round(b.goldPnl / b.count) : 0;
    }),
    backgroundColor: (PERSONA_COLORS[p] || '#999') + '99',
    borderColor: PERSONA_COLORS[p] || '#999', borderWidth: 1.5, borderRadius: 4,
  }));
  const betKey = `bet-${gameId}`;
  if (_charts[betKey]) _charts[betKey].destroy();
  const betCanvas = document.getElementById(`chart-bet-${gameId}`);
  if (betCanvas) {
    _charts[betKey] = new Chart(betCanvas, {
      type: 'bar', data: { labels: multKeys.map(m => `x${m}`), datasets: betDatasets },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } } },
    });
  }

  // 와일드 비용/판, 스트릭 보너스/판
  _chartBar(gameId, 'wild', labels, colors, pKeys.map(p => pAgg[p].played ? Math.round(pAgg[p].wildCost / pAgg[p].played) : 0), '', '와일드비용/판');
  _chartBar(gameId, 'streak', labels, colors, pKeys.map(p => pAgg[p].played ? Math.round(pAgg[p].streakGold / pAgg[p].played) : 0), '', '스트릭/판');

  // 골드 잔액 추이 (페르소나별)
  const sortedRuns = [...runs].sort((a, b) => {
    if (a.run_date !== b.run_date) return a.run_date.localeCompare(b.run_date);
    return (a.created_at || '').localeCompare(b.created_at || '');
  });
  // 페르소나별 데이터 구성
  const balByPersona = {};
  const balDates = [];
  let runIdx = 0;
  for (const r of sortedRuns) {
    const m = r.metrics || {};
    const p = r.persona;
    if (!balByPersona[p]) balByPersona[p] = [];
    const label = `${r.run_date.slice(5)} #${++runIdx}`;
    if (!balDates.includes(label)) balDates.push(label);
    // 종료 잔액 기록
    if (m.gold_end != null) {
      balByPersona[p].push({ x: label, y: m.gold_end });
    } else if (m.gold_start != null) {
      balByPersona[p].push({ x: label, y: m.gold_start });
    }
  }
  const balDatasets = Object.entries(balByPersona).sort(([a],[b]) => (PERSONA_ORDER.indexOf(a)===-1?99:PERSONA_ORDER.indexOf(a)) - (PERSONA_ORDER.indexOf(b)===-1?99:PERSONA_ORDER.indexOf(b))).map(([p, points]) => ({
    label: PERSONA_KO[p] || p,
    data: points,
    borderColor: PERSONA_COLORS[p] || '#999',
    backgroundColor: (PERSONA_COLORS[p] || '#999') + '22',
    tension: 0.3,
    fill: false,
    pointRadius: 3,
  }));
  const gbKey = `goldbal-${gameId}`;
  if (_charts[gbKey]) _charts[gbKey].destroy();
  const gbCanvas = document.getElementById(`chart-goldbal-${gameId}`);
  if (gbCanvas && balDatasets.some(ds => ds.data.length)) {
    _charts[gbKey] = new Chart(gbCanvas, {
      type: 'line',
      data: { labels: balDates, datasets: balDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#94a3b8' } }, tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.raw.y?.toLocaleString() || c.raw.toLocaleString()} G` } } },
        scales: { x: { ticks: { maxTicksLimit: 15, font: { size: 9 } } }, y: { ticks: { callback: v => (v/1000).toFixed(0) + 'K' } } },
      },
    });
  }
}

/* ══════════════════════════════════════════════
   카테고리: 밸런스
   ══════════════════════════════════════════════ */
function renderCatBalance(gameId, stages, runs) {
  // 난이도별 분포
  const byDiff = {};
  for (const s of stages) {
    const d = s.difficulty || 0;
    if (!byDiff[d]) byDiff[d] = { played: 0 };
    byDiff[d].played++;
  }
  const diffRows = Object.entries(byDiff).sort(([a],[b]) => +a - +b).map(([d, v]) => {
    const diffClass = +d === 4 ? 'diff-superhard' : +d === 3 ? 'diff-hard' : 'diff-normal';
    return `<tr><td class="${diffClass}">${DIFF_TIERS[d] || 'Tier '+d}</td><td>${v.played}</td></tr>`;
  }).join('');

  // DDA 발동률
  let ddaTotal = 0, ddaAdjusted = 0;
  for (const s of stages) {
    ddaTotal++;
    if ((s.details || {}).dda_adjusted) ddaAdjusted++;
  }
  const ddaRate = ddaTotal ? (ddaAdjusted / ddaTotal * 100).toFixed(1) : '0';

  // 연패 분석
  const failParts = [];
  for (const r of runs) {
    const ft = (r.metrics || {}).fail_tracking || {};
    if (ft.max_consecutive_fails) {
      failParts.push(`<tr><td>${r.run_date}</td><td>${PERSONA_KO[r.persona] || r.persona}</td>
        <td>${ft.max_consecutive_fails || 0}</td>
        <td>${ft.fail_spiral_count || 0}</td>
        <td>${ft.pity_triggers || 0}</td></tr>`);
    }
  }

  // 입장료 밸런스 검증
  let balPass = 0, balFail = 0;
  const balFailItems = [];
  for (const s of stages) {
    const v = (s.details || {}).validation;
    if (!v || !v.checks) continue;
    for (const c of v.checks) {
      if (c.name && c.name.includes('입장료')) {
        if (c.pass) balPass++; else { balFail++; balFailItems.push(`Lv${s.game_level||'?'}(${s.stage_number}) 예상:${c.expected} 실제:${c.actual}`); }
      }
    }
  }
  const balTotal = balPass + balFail;
  const balRate = balTotal ? (balPass / balTotal * 100).toFixed(0) : '-';
  const balRateColor = balFail === 0 ? 'var(--status-ok)' : 'var(--status-err)';

  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">DDA 발동률</div><div class="value">${ddaRate}%</div><div class="sub">${ddaAdjusted} / ${ddaTotal} 스테이지</div></div>
      <div class="metric-box"><div class="label">입장료 검증</div><div class="value" style="color:${balRateColor}">${balRate}%</div><div class="sub">통과 ${balPass} / 실패 ${balFail}</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>난이도별 분포</h4><canvas id="chart-diff-${gameId}"></canvas></div>
      <div class="chart-box"><h4>평균 턴 수</h4><canvas id="chart-turns-${gameId}"></canvas></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>게임플레이 세부 지표</h4><canvas id="chart-gp-${gameId}"></canvas></div>
      <div class="chart-box"><h4>미스드로우 /판</h4><canvas id="chart-miss-${gameId}"></canvas></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>평균 콤보 /판</h4><canvas id="chart-combo-${gameId}"></canvas></div>
      <div class="chart-box">
        <h4>난이도별 상세</h4>
        <table><thead><tr><th>난이도</th><th>플레이 수</th></tr></thead>
        <tbody>${diffRows}</tbody></table>
      </div>
    </div>
    ${balFailItems.length ? `<div class="tbl-wrap"><h4>입장료 검증 실패 항목</h4>
      <div style="font-size:12px;color:var(--status-err)">${balFailItems.map(f => `<div>✗ ${f}</div>`).join('')}</div></div>` : ''}
    ${failParts.length ? `<div class="tbl-wrap"><h4>연패 분석</h4>
      <table><thead><tr><th>날짜</th><th>페르소나</th><th>최대 연패</th><th>페일 스파이럴</th><th>Pity 발동</th></tr></thead>
      <tbody>${failParts.join('')}</tbody></table></div>` : ''}
  `;
}

/* 밸런스 탭 차트 렌더링 */
function renderBalanceCharts(gameId, stages, runs) {
  const pAgg = _aggregatePersonaStages(stages);
  const pKeys = Object.keys(pAgg).sort((a,b) => (PERSONA_ORDER.indexOf(a)===-1?99:PERSONA_ORDER.indexOf(a)) - (PERSONA_ORDER.indexOf(b)===-1?99:PERSONA_ORDER.indexOf(b)));
  const labels = pKeys.map(p => PERSONA_KO[p] || p);
  const colors = pKeys.map(p => PERSONA_COLORS[p] || '#999');

  // 난이도별 분포 차트 (플레이 횟수만)
  const byDiff = {};
  for (const s of stages) {
    const d = s.difficulty || 0;
    if (!byDiff[d]) byDiff[d] = { played: 0 };
    byDiff[d].played++;
  }
  const diffKeys = Object.keys(byDiff).sort((a, b) => +a - +b);
  const diffLabels = diffKeys.map(d => DIFF_TIERS[d] || 'Tier ' + d);
  const diffData = diffKeys.map(d => byDiff[d].played);
  const diffColors = diffKeys.map(d => DIFF_COLORS[d] || '#999');
  const diffChartKey = `diff-${gameId}`;
  if (_charts[diffChartKey]) _charts[diffChartKey].destroy();
  const diffCanvas = document.getElementById(`chart-diff-${gameId}`);
  if (diffCanvas) {
    _charts[diffChartKey] = new Chart(diffCanvas, {
      type: 'bar',
      data: { labels: diffLabels, datasets: [{ label: '플레이 횟수', data: diffData, backgroundColor: diffColors.map(c => c + '99'), borderColor: diffColors, borderWidth: 1.5, borderRadius: 4 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { beginAtZero: true } },
        plugins: { legend: { display: false } },
      },
    });
  }

  // 평균 턴 수
  const turnsData = pKeys.map(p => {
    const a = pAgg[p];
    return a.turnN ? +(a.turns / a.turnN).toFixed(1) : 0;
  });
  _chartBar(gameId, 'turns', labels, colors, turnsData, '', '평균 턴');

  // 게임플레이 세부 지표
  const gpMetrics = ['매치/턴', '드로우/턴', '와일드매칭/판', '와일드구매/판', '엑스트라덱/판'];
  const gpColors = ['#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6'];
  const gpVals = pKeys.map(p => {
    const a = pAgg[p];
    const matchPerTurn = a.turnN ? +(a.matches / a.turns).toFixed(2) : 0;
    const drawPerTurn = a.turnN ? +(a.draws / a.turns).toFixed(2) : 0;
    const wildPerGame = a.played ? +(a.wildMatches / a.played).toFixed(2) : 0;
    const wildBuyPerGame = a.played ? +(a.wildBuys / a.played).toFixed(2) : 0;
    const extraPerGame = a.played ? +(a.extraDecks / a.played).toFixed(2) : 0;
    return [matchPerTurn, drawPerTurn, wildPerGame, wildBuyPerGame, extraPerGame];
  });
  const gpDatasets = gpMetrics.map((m, mi) => ({
    label: m, data: pKeys.map((_, pi) => gpVals[pi][mi]),
    backgroundColor: gpColors[mi] + '99', borderColor: gpColors[mi], borderWidth: 1.5, borderRadius: 4,
  }));
  const gpDetailKey = `gp-${gameId}`;
  if (_charts[gpDetailKey]) _charts[gpDetailKey].destroy();
  const gpCanvas = document.getElementById(`chart-gp-${gameId}`);
  if (gpCanvas) {
    _charts[gpDetailKey] = new Chart(gpCanvas, {
      type: 'bar', data: { labels, datasets: gpDatasets },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } } },
    });
  }

  // 미스드로우/판
  _chartBar(gameId, 'miss', labels, colors, pKeys.map(p => pAgg[p].played ? +(pAgg[p].missDraws / pAgg[p].played).toFixed(2) : 0), '', '미스드로우/판');
  // 콤보/판
  _chartBar(gameId, 'combo', labels, colors, pKeys.map(p => pAgg[p].played ? +(pAgg[p].combos / pAgg[p].played).toFixed(2) : 0), '', '콤보/판');
}

/* ══════════════════════════════════════════════
   카테고리: 기믹 (SCJ 전용)
   ══════════════════════════════════════════════ */
function renderCatGimmick(gameId, stages, runs) {
  const pAgg = _aggregatePersonaStages(stages);
  const pKeys = Object.keys(pAgg).sort((a,b) => (PERSONA_ORDER.indexOf(a)===-1?99:PERSONA_ORDER.indexOf(a)) - (PERSONA_ORDER.indexOf(b)===-1?99:PERSONA_ORDER.indexOf(b)));

  // 전체 합산
  let totalGimmickMaps = 0, totalWild = 0, totalExtra = 0, totalPlus = 0;
  const allGTypes = {};
  for (const p of pKeys) {
    const a = pAgg[p];
    totalGimmickMaps += a.gimmicks; // 기믹 배치된 판 수
    totalWild += a.wildMatches;
    totalExtra += a.extraDecks;
    totalPlus += a.plusCards;
    for (const [k, v] of Object.entries(a.gimmickTypes)) {
      allGTypes[k] = (allGTypes[k] || 0) + v;
    }
  }
  const totalPlayed = pKeys.reduce((s, p) => s + pAgg[p].played, 0);

  // 기믹 타입별 요약 텍스트 (가중치 포함)
  const gtSummary = Object.entries(allGTypes)
    .sort(([,a],[,b]) => b - a)
    .map(([k, cnt]) => {
      const name = GIMMICK_NAMES[k] || '타입'+k;
      return `${name}: ${cnt}맵`;
    }).join(', ') || '없음';

  const pRows = pKeys.map(p => {
    const a = pAgg[p];
    const gRate = a.played ? (a.gimmicks / a.played * 100).toFixed(0) : 0;
    return `<tr><td style="color:${PERSONA_COLORS[p]||'#999'}">${PERSONA_KO[p]||p}</td>
     <td>${a.gimmicks} (${gRate}%)</td><td>${a.wildMatches}</td><td>${a.plusCards}</td><td>${a.extraDecks}</td><td>${a.played}</td></tr>`;
  }).join('');

  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">기믹 배치 맵</div><div class="value">${totalGimmickMaps}<span style="font-size:12px;color:var(--text-muted)"> / ${totalPlayed}판</span></div></div>
      <div class="metric-box"><div class="label">와일드카드 사용</div><div class="value">${totalWild}</div></div>
      <div class="metric-box"><div class="label">플러스카드</div><div class="value">${totalPlus}</div></div>
      <div class="metric-box"><div class="label">엑스트라덱</div><div class="value">${totalExtra}</div></div>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;padding:6px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px">
      기믹 분포: ${gtSummary}
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>기믹 배치 종류·플러스카드 /판</h4><canvas id="chart-gimmick-${gameId}"></canvas></div>
      <div class="chart-box"><h4>기믹 타입별 배치 맵 수</h4><canvas id="chart-gtype-${gameId}"></canvas></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>기믹 타입별 비율</h4><canvas id="chart-gpie-${gameId}"></canvas></div>
      <div class="chart-box"><h4>기믹 등장률 (페르소나별)</h4><canvas id="chart-grate-${gameId}"></canvas></div>
    </div>
    <div class="tbl-wrap"><h4>기믹 가중치 참조 (밸런스시트)</h4>
      <table><thead><tr><th>기믹</th><th>맵스코어 가중치</th><th>최대 배치</th><th>설명</th></tr></thead>
      <tbody>
        <tr><td style="color:#f59e0b">키&자물쇠</td><td style="color:var(--status-err)">+20 /개</td><td>4</td><td>색상별 3종, 키와 자물쇠 쌍 매칭 필요</td></tr>
        <tr><td style="color:#3b82f6">얼음</td><td style="color:var(--status-err)">+30 /개</td><td>8</td><td>카드 위에 얼음, 매칭 시 해제</td></tr>
        <tr><td style="color:#ef4444">러너</td><td style="color:var(--status-err)">+40 /개</td><td>8</td><td>이동하는 카드, 위치 예측 필요</td></tr>
        <tr><td style="color:#10b981">플러스카드</td><td style="color:var(--status-ok)">-10 /개</td><td>3</td><td>맵 난이도 완화, 추가 카드 제공</td></tr>
      </tbody></table></div>
    <div class="tbl-wrap"><h4>페르소나별 기믹·아이템</h4>
      <table><thead><tr><th>페르소나</th><th>기믹 맵 (비율)</th><th>와일드</th><th>플러스카드</th><th>엑스트라덱</th><th>총 판수</th></tr></thead>
      <tbody>${pRows}</tbody></table></div>
  `;
}

/* 기믹 탭 차트 렌더링 */
function renderGimmickCharts(gameId, stages) {
  const pAgg = _aggregatePersonaStages(stages);
  const pKeys = Object.keys(pAgg).sort((a,b) => (PERSONA_ORDER.indexOf(a)===-1?99:PERSONA_ORDER.indexOf(a)) - (PERSONA_ORDER.indexOf(b)===-1?99:PERSONA_ORDER.indexOf(b)));
  const labels = pKeys.map(p => PERSONA_KO[p] || p);
  const colors = pKeys.map(p => PERSONA_COLORS[p] || '#999');

  // 기믹·플러스카드/판
  const gimmickPerGame = pKeys.map(p => pAgg[p].played ? +(pAgg[p].gimmicks / pAgg[p].played).toFixed(2) : 0);
  const plusPerGame = pKeys.map(p => pAgg[p].played ? +(pAgg[p].plusCards / pAgg[p].played).toFixed(2) : 0);
  const gKey = `gimmick-${gameId}`;
  if (_charts[gKey]) _charts[gKey].destroy();
  const gCanvas = document.getElementById(`chart-gimmick-${gameId}`);
  if (gCanvas) {
    _charts[gKey] = new Chart(gCanvas, {
      type: 'bar',
      data: { labels, datasets: [
        { label: '기믹 배치 종류/판', data: gimmickPerGame, backgroundColor: '#f59e0b99', borderColor: '#f59e0b', borderWidth: 1.5, borderRadius: 4 },
        { label: '플러스카드/판', data: plusPerGame, backgroundColor: '#8b5cf699', borderColor: '#8b5cf6', borderWidth: 1.5, borderRadius: 4 },
      ]},
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } } },
    });
  }

  // 기믹 타입별 배치 맵 수
  const allGTypes = {};
  for (const p of pKeys) {
    for (const [k, v] of Object.entries(pAgg[p].gimmickTypes)) {
      allGTypes[k] = (allGTypes[k] || 0) + v;
    }
  }
  const gtKeys = Object.keys(allGTypes).sort((a, b) => allGTypes[b] - allGTypes[a]);
  const gtLabels = gtKeys.map(k => GIMMICK_NAMES[k] || `타입${k}`);
  const gtData = gtKeys.map(k => allGTypes[k]);
  const gtColors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

  const gtKey = `gtype-${gameId}`;
  if (_charts[gtKey]) _charts[gtKey].destroy();
  const gtCanvas = document.getElementById(`chart-gtype-${gameId}`);
  if (gtCanvas) {
    _charts[gtKey] = new Chart(gtCanvas, {
      type: 'bar',
      data: { labels: gtLabels, datasets: [{ label: '배치 맵 수', data: gtData, backgroundColor: gtColors.slice(0, gtKeys.length), borderRadius: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
    });
  }

  // 기믹 타입별 비율 (도넛)
  const gpKey = `gpie-${gameId}`;
  if (_charts[gpKey]) _charts[gpKey].destroy();
  const gpCanvas = document.getElementById(`chart-gpie-${gameId}`);
  if (gpCanvas) {
    _charts[gpKey] = new Chart(gpCanvas, {
      type: 'doughnut',
      data: { labels: gtLabels, datasets: [{ data: gtData, backgroundColor: gtColors.slice(0, gtKeys.length) }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right', labels: { color: '#94a3b8' } } },
      },
    });
  }

  // 기믹 보유율 (페르소나별)
  const grKey = `grate-${gameId}`;
  if (_charts[grKey]) _charts[grKey].destroy();
  const grCanvas = document.getElementById(`chart-grate-${gameId}`);
  if (grCanvas) {
    const grData = pKeys.map(p => pAgg[p].played ? +(pAgg[p].gimmicks / pAgg[p].played * 100).toFixed(1) : 0);
    _charts[grKey] = new Chart(grCanvas, {
      type: 'bar',
      data: { labels, datasets: [{ label: '기믹 등장률 (%)', data: grData, backgroundColor: colors.map(c => c + '99'), borderColor: colors, borderWidth: 1.5, borderRadius: 4 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } },
        plugins: { legend: { display: false } },
      },
    });
  }
}

/* ══════════════════════════════════════════════
   카테고리: 타일 (CTZ 전용)
   ══════════════════════════════════════════════ */
function renderCatTiles(gameId, stages, runs) {
  const totalStages = stages.length;
  if (!totalStages) return '<div style="color:var(--text-muted);padding:20px">타일 데이터 없음 — 프리플레이를 실행하면 표시됩니다</div>';

  let totalScore = 0, totalContinues = 0, totalTiles = 0, totalClicks = 0;
  const slotData = { clearUsed: [], failUsed: [] };
  const tileKindCounts = {};

  for (const s of stages) {
    const d = s.details || {};
    totalScore += d.score || 0;
    totalContinues += d.continues || 0;
    totalTiles += d.tiles_cleared || 0;
    totalClicks += d.total_clicks || 0;
    if (d.slots_used != null) {
      (s.result === 'clear' ? slotData.clearUsed : slotData.failUsed).push(d.slots_used);
    }
    if (d.tile_kinds != null) {
      const k = String(d.tile_kinds);
      tileKindCounts[k] = (tileKindCounts[k] || 0) + 1;
    }
  }

  const avgScore = totalStages ? Math.round(totalScore / totalStages) : 0;
  const avgTiles = totalStages ? Math.round(totalTiles / totalStages) : 0;

  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">평균 점수</div><div class="value">${avgScore.toLocaleString()}</div></div>
      <div class="metric-box"><div class="label">이어하기 횟수</div><div class="value">${totalContinues}</div></div>
      <div class="metric-box"><div class="label">평균 타일 수</div><div class="value">${avgTiles}</div></div>
      <div class="metric-box"><div class="label">총 클릭</div><div class="value">${totalClicks.toLocaleString()}</div></div>
      <div class="metric-box"><div class="label">총 판수</div><div class="value">${totalStages}</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>타일 종류 수 분포</h4><canvas id="chart-tilekind-${gameId}"></canvas></div>
      <div class="chart-box"><h4>슬롯 사용량 분포</h4><canvas id="chart-slot-${gameId}"></canvas></div>
    </div>
  `;
}

function renderTileCharts(gameId, stages, runs) {
  const tileKindCounts = {};
  const slotClear = [], slotFail = [];
  for (const s of stages) {
    const d = s.details || {};
    if (d.tile_kinds != null) {
      const k = String(d.tile_kinds);
      tileKindCounts[k] = (tileKindCounts[k] || 0) + 1;
    }
    if (d.slots_used != null) {
      (s.result === 'clear' ? slotClear : slotFail).push(d.slots_used);
    }
  }

  // 타일 종류 수 분포 (막대)
  const tkKeys = Object.keys(tileKindCounts).sort((a, b) => +a - +b);
  const tkColors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16'];
  const tkKey = `tilekind-${gameId}`;
  if (_charts[tkKey]) _charts[tkKey].destroy();
  const tkCanvas = document.getElementById(`chart-tilekind-${gameId}`);
  if (tkCanvas && tkKeys.length) {
    _charts[tkKey] = new Chart(tkCanvas, {
      type: 'bar',
      data: { labels: tkKeys.map(k => k + '종'), datasets: [{ label: '판 수', data: tkKeys.map(k => tileKindCounts[k]), backgroundColor: tkColors.slice(0, tkKeys.length).map(c => c + '99'), borderColor: tkColors.slice(0, tkKeys.length), borderWidth: 1.5, borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } },
    });
  }

  // 슬롯 사용량 분포
  const slotKey = `slot-${gameId}`;
  if (_charts[slotKey]) _charts[slotKey].destroy();
  const slotCanvas = document.getElementById(`chart-slot-${gameId}`);
  if (slotCanvas && (slotClear.length || slotFail.length)) {
    const maxSlot = Math.max(...slotClear, ...slotFail, 0);
    const slotLabels = Array.from({ length: maxSlot + 1 }, (_, i) => String(i));
    const clearBins = new Array(maxSlot + 1).fill(0);
    const failBins = new Array(maxSlot + 1).fill(0);
    slotClear.forEach(v => { if (v <= maxSlot) clearBins[v]++; });
    slotFail.forEach(v => { if (v <= maxSlot) failBins[v]++; });
    _charts[slotKey] = new Chart(slotCanvas, {
      type: 'bar',
      data: { labels: slotLabels, datasets: [
        { label: '클리어', data: clearBins, backgroundColor: '#10b98199', borderColor: '#10b981', borderWidth: 1, borderRadius: 3 },
        { label: '실패', data: failBins, backgroundColor: '#ef444499', borderColor: '#ef4444', borderWidth: 1, borderRadius: 3 },
      ]},
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } } },
    });
  }
}

/* ══════════════════════════════════════════════
   카테고리: 아이템 (CTZ 전용)
   ══════════════════════════════════════════════ */
function renderCatCtzItems(gameId, stages, runs) {
  let undo = 0, shuffle = 0, magnet = 0, continues = 0;
  const byPersona = {};

  for (const s of stages) {
    const d = s.details || {};
    const items = d.items_used || {};
    undo += items.undo || 0;
    shuffle += items.shuffle || 0;
    magnet += items.magnet || 0;
    continues += d.continues || 0;

    const p = s.persona;
    if (!byPersona[p]) byPersona[p] = { undo: 0, shuffle: 0, magnet: 0, continues: 0, levels: 0 };
    byPersona[p].undo += items.undo || 0;
    byPersona[p].shuffle += items.shuffle || 0;
    byPersona[p].magnet += items.magnet || 0;
    byPersona[p].continues += d.continues || 0;
    byPersona[p].levels++;
  }

  const pRows = Object.entries(byPersona).sort(([a],[b]) => (PERSONA_ORDER.indexOf(a)===-1?99:PERSONA_ORDER.indexOf(a)) - (PERSONA_ORDER.indexOf(b)===-1?99:PERSONA_ORDER.indexOf(b))).map(([p, d]) =>
    `<tr><td style="color:${PERSONA_COLORS[p]||'#999'}">${PERSONA_KO[p]||p}</td>
     <td>${d.undo}</td><td>${d.shuffle}</td><td>${d.magnet}</td><td>${d.continues}</td><td>${d.levels}</td></tr>`
  ).join('');

  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">되돌리기</div><div class="value">${undo}</div></div>
      <div class="metric-box"><div class="label">셔플</div><div class="value">${shuffle}</div></div>
      <div class="metric-box"><div class="label">마그넷</div><div class="value">${magnet}</div></div>
      <div class="metric-box"><div class="label">이어하기</div><div class="value">${continues}</div></div>
    </div>
    <div class="tbl-wrap"><h4>페르소나별 아이템 사용</h4>
      <table><thead><tr><th>페르소나</th><th>되돌리기</th><th>셔플</th><th>마그넷</th><th>이어하기</th><th>총 판수</th></tr></thead>
      <tbody>${pRows || '<tr><td colspan="6" style="color:var(--text-muted)">데이터 없음</td></tr>'}</tbody></table></div>
  `;
}

/* ══════════════════════════════════════════════
   카테고리: 소요시간 분석 (CTZ 전용)
   ══════════════════════════════════════════════ */
function renderCatTimeAnalysis(gameId, stages, runs) {
  const byDiff = {};
  const byStageNum = {};

  for (const s of stages) {
    const d = s.details || {};
    const t = s.time_sec || 0;
    const diff = s.difficulty || 0;

    if (!byDiff[diff]) byDiff[diff] = { times: [], count: 0 };
    byDiff[diff].times.push(t);
    byDiff[diff].count++;

    const st = s.stage_number || '?';
    if (!byStageNum[st]) byStageNum[st] = { times: [], level: s.game_level };
    byStageNum[st].times.push(t);
  }

  const diffRows = Object.entries(byDiff).sort(([a],[b]) => +a - +b).map(([d, v]) => {
    const avg = v.times.length ? (v.times.reduce((a,b) => a+b, 0) / v.times.length).toFixed(1) : '-';
    const max = v.times.length ? Math.max(...v.times).toFixed(1) : '-';
    return `<tr><td>${DIFF_TIERS[d] || 'Tier '+d}</td><td>${v.count}</td><td>${avg}초</td><td>${max}초</td></tr>`;
  }).join('');

  return `
    <div class="chart-grid">
      <div class="chart-box"><h4>난이도별 평균 소요시간</h4><canvas id="chart-timediff-${gameId}"></canvas></div>
      <div class="chart-box"><h4>스테이지별 소요시간 추이</h4><canvas id="chart-timestage-${gameId}"></canvas></div>
    </div>
    <div class="tbl-wrap"><h4>난이도별 소요시간 상세</h4>
      <table><thead><tr><th>난이도</th><th>판수</th><th>평균</th><th>최대</th></tr></thead>
      <tbody>${diffRows || '<tr><td colspan="4" style="color:var(--text-muted)">데이터 없음</td></tr>'}</tbody></table></div>
  `;
}

function renderTimeCharts(gameId, stages, runs) {
  const byDiff = {};
  const byStageNum = {};

  for (const s of stages) {
    const t = s.time_sec || 0;
    const diff = s.difficulty || 0;
    if (!byDiff[diff]) byDiff[diff] = { times: [] };
    byDiff[diff].times.push(t);

    const st = s.stage_number || '?';
    if (!byStageNum[st]) byStageNum[st] = { times: [], level: s.game_level };
    byStageNum[st].times.push(t);
  }

  // 난이도별 평균 소요시간
  const diffKeys = Object.keys(byDiff).sort((a, b) => +a - +b);
  const diffLabels = diffKeys.map(d => DIFF_TIERS[d] || 'Tier ' + d);
  const diffAvgs = diffKeys.map(d => {
    const ts = byDiff[d].times;
    return ts.length ? +(ts.reduce((a,b) => a+b, 0) / ts.length).toFixed(1) : 0;
  });
  const diffColors = diffKeys.map(d => DIFF_COLORS[d] || '#999');

  const tdKey = `timediff-${gameId}`;
  if (_charts[tdKey]) _charts[tdKey].destroy();
  const tdCanvas = document.getElementById(`chart-timediff-${gameId}`);
  if (tdCanvas && diffKeys.length) {
    _charts[tdKey] = new Chart(tdCanvas, {
      type: 'bar',
      data: { labels: diffLabels, datasets: [{ label: '평균 소요시간 (초)', data: diffAvgs, backgroundColor: diffColors.map(c => c + '99'), borderColor: diffColors, borderWidth: 1.5, borderRadius: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } },
    });
  }

  // 스테이지별 소요시간 추이
  const stageKeys = Object.keys(byStageNum).sort((a, b) => {
    const la = byStageNum[a].level || 0, lb = byStageNum[b].level || 0;
    return la - lb;
  });
  const stageLabels = stageKeys.map(st => `${st}`);
  const stageAvgs = stageKeys.map(st => {
    const ts = byStageNum[st].times;
    return ts.length ? +(ts.reduce((a,b) => a+b, 0) / ts.length).toFixed(1) : 0;
  });

  const tsKey = `timestage-${gameId}`;
  if (_charts[tsKey]) _charts[tsKey].destroy();
  const tsCanvas = document.getElementById(`chart-timestage-${gameId}`);
  if (tsCanvas && stageKeys.length) {
    _charts[tsKey] = new Chart(tsCanvas, {
      type: 'line',
      data: { labels: stageLabels, datasets: [{ label: '평균 소요시간 (초)', data: stageAvgs, borderColor: '#3b82f6', backgroundColor: '#3b82f622', tension: 0.3, fill: true }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 20 } }, y: { beginAtZero: true } } },
    });
  }
}

/* ══════════════════════════════════════════════
   카테고리: 스테이지 (CTZ 전용)
   ══════════════════════════════════════════════ */
function renderCatStagesCTZ(gameId, stages) {
  const byStage = {};
  for (const s of stages) {
    const key = s.stage_number || s.game_level || '?';
    if (!byStage[key]) byStage[key] = { played: 0, times: [], level: s.game_level, scores: [], slotsUsed: [], tileKinds: [], continues: 0, difficulty: s.difficulty || 0 };
    const v = byStage[key];
    v.played++;
    if (s.time_sec) v.times.push(s.time_sec);
    const d = s.details || {};
    if (d.score != null) v.scores.push(d.score);
    if (d.slots_used != null) v.slotsUsed.push(d.slots_used);
    if (d.tile_kinds != null) v.tileKinds.push(d.tile_kinds);
    v.continues += d.continues || 0;
    if (s.difficulty) v.difficulty = s.difficulty;
  }
  const rows = Object.entries(byStage)
    .sort(([a],[b]) => a.localeCompare(b))
    .map(([st, v]) => {
      const avgT = v.times.length ? (v.times.reduce((a,b)=>a+b,0) / v.times.length).toFixed(1) : '-';
      const avgScore = v.scores.length ? Math.round(v.scores.reduce((a,b)=>a+b,0) / v.scores.length).toLocaleString() : '-';
      const avgSlots = v.slotsUsed.length ? (v.slotsUsed.reduce((a,b)=>a+b,0) / v.slotsUsed.length).toFixed(1) : '-';
      const avgTK = v.tileKinds.length ? (v.tileKinds.reduce((a,b)=>a+b,0) / v.tileKinds.length).toFixed(0) : '-';
      const diffTier = v.difficulty || 0;
      const diffColor = diffTier === 4 ? '#ef4444' : diffTier === 3 ? '#f59e0b' : diffTier === 2 ? '#10b981' : '#64748b';
      const diffName = DIFF_TIERS[diffTier] || '-';
      return `<tr>
        <td>${st}</td><td>${v.played}</td>
        <td>${avgT}초</td><td>${avgScore}</td><td>${avgSlots}</td>
        <td>${avgTK}</td><td>${v.continues}</td>
        <td style="color:${diffColor};font-weight:600">${diffName}</td></tr>`;
    }).join('');
  const diffOptions = [...new Set(Object.values(byStage).map(v => v.difficulty))].sort();
  const diffFilterOpts = diffOptions.map(d => `<option value="${d}">${DIFF_TIERS[d] || 'Tier '+d}</option>`).join('');
  return `
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;padding:4px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px">
      색상 규칙 — 난이도: <span style="color:#10b981">노말</span> · <span style="color:#f59e0b">하드</span> · <span style="color:#ef4444">슈퍼하드</span>
    </div>
    <div class="tbl-wrap"><h4>스테이지별 상세 (${Object.keys(byStage).length}개)</h4>
      <table id="stg-table-${gameId}"><thead><tr>
        <th class="sortable" onclick="sortStageTable('${gameId}',0,'str')">스테이지</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',1,'num')">플레이</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',2,'num')">평균 시간</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',3,'num')">평균 점수</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',4,'num')">슬롯 사용</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',5,'num')">타일 종류</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',6,'num')">이어하기</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',7,'str')">난이도</th>
      </tr></thead>
      <tbody>${rows}</tbody></table></div>
  `;
}

/* ══════════════════════════════════════════════
   카테고리: 스테이지 (SCJ / 공통)
   ══════════════════════════════════════════════ */
function renderCatStages(gameId, stages) {
  if (gameId === 'CTZ') return renderCatStagesCTZ(gameId, stages);
  const byStage = {};
  for (const s of stages) {
    const key = s.stage_number || s.game_level || '?';
    if (!byStage[key]) byStage[key] = { played: 0, times: [], level: s.game_level, mapScores: [], mapDetails: [], turns: [], goldPnl: 0, difficulty: s.difficulty || 0 };
    byStage[key].played++;
    if (s.time_sec) byStage[key].times.push(s.time_sec);
    const d = s.details || {};
    if (d.map_score != null) {
      byStage[key].mapScores.push(d.map_score);
      // events에서 기믹 타입 추출 (매칭 횟수 아닌 존재 여부)
      const detailGimmicks = new Set();
      for (const e of (d.events || [])) {
        if (typeof e !== 'string') continue;
        if (e.startsWith('gimmick_match:')) detailGimmicks.add(e.slice(14).split(' (')[0].trim());
        else if (e.startsWith('gimmick:')) detailGimmicks.add(e.slice(8).split(' (')[0].trim());
      }
      if (d.plus_card_count > 0) detailGimmicks.add('플러스카드');
      byStage[key].mapDetails.push({
        score: d.map_score, base: d.map_score_base || 0,
        gimmick: d.gimmick_score || 0, field: d.field_total || 0,
        gimmickTypes: [...detailGimmicks],
      });
    }
    if (d.turns != null) byStage[key].turns.push(d.turns);
    byStage[key].goldPnl += d.gold_pnl || 0;
    if (s.difficulty) byStage[key].difficulty = s.difficulty;
  }
  const rows = Object.entries(byStage)
    .sort(([,a],[,b]) => (a.level||0) - (b.level||0))
    .map(([st, v]) => {
      const avgT = v.times.length ? (v.times.reduce((a,b)=>a+b,0) / v.times.length).toFixed(1) : '-';
      const avgMS = v.mapScores.length ? Math.round(v.mapScores.reduce((a,b)=>a+b,0) / v.mapScores.length) : '-';
      const avgTurns = v.turns.length ? (v.turns.reduce((a,b)=>a+b,0) / v.turns.length).toFixed(1) : '-';
      const avgGold = v.played ? Math.round(v.goldPnl / v.played) : 0;
      const goldColor = avgGold >= 0 ? 'var(--status-ok)' : 'var(--status-err)';
      // 난이도 색상: 튜토리얼=회색, 노말=초록, 하드=노랑, 슈퍼하드=빨강
      const diffTier = v.difficulty || 0;
      const diffColor = diffTier === 4 ? '#ef4444' : diffTier === 3 ? '#f59e0b' : diffTier === 2 ? '#10b981' : '#64748b';
      const diffName = DIFF_TIERS[diffTier] || '-';
      // 맵스코어 색상: 1~700 초록, 701~900 주황, 901+ 빨강
      const msNum = typeof avgMS === 'number' ? avgMS : 0;
      const msColor = msNum >= 901 ? '#ef4444' : msNum >= 701 ? '#f59e0b' : msNum >= 1 ? '#10b981' : '#64748b';
      // 턴수 색상: 적을수록 초록(효율), 많을수록 빨강(비효율)
      const turnsNum = typeof avgTurns === 'string' ? parseFloat(avgTurns) : avgTurns;
      const turnsColor = turnsNum >= 50 ? '#ef4444' : turnsNum >= 40 ? '#f59e0b' : turnsNum >= 1 ? '#10b981' : '#64748b';
      // 맵스코어 상세 (펼치기용)
      const rowId = `ms_${gameId}_${st}`;
      const md = v.mapDetails;
      const avgBase = md.length ? Math.round(md.reduce((a,d)=>a+d.base,0)/md.length) : '-';
      const avgGimmickScore = md.length ? Math.round(md.reduce((a,d)=>a+d.gimmick,0)/md.length) : 0;
      const avgField = md.length ? Math.round(md.reduce((a,d)=>a+d.field,0)/md.length) : '-';
      // 기믹 정보: events 기반 타입 존재 + gimmick_score로 기여 점수
      const gimmickTypeSets = {};
      for (const d of md) {
        for (const name of (d.gimmickTypes || [])) {
          if (!gimmickTypeSets[name]) gimmickTypeSets[name] = 0;
          gimmickTypeSets[name]++;
        }
      }
      const gimmickStr = Object.keys(gimmickTypeSets).length
        ? Object.entries(gimmickTypeSets).map(([name, cnt]) => `${name} (${cnt}/${md.length}판)`).join(', ')
        : '없음';
      return `<tr style="cursor:pointer" onclick="var d=document.getElementById('${rowId}');d.style.display=d.style.display==='none'?'table-row':'none'">
        <td>${st}</td><td>Lv${v.level||'?'}</td><td>${v.played}</td>
        <td>${avgT}초</td>
        <td style="color:${goldColor}">${avgGold.toLocaleString()}</td>
        <td style="color:${turnsColor};font-weight:600">${avgTurns}</td>
        <td style="color:${msColor};font-weight:600">${avgMS}</td>
        <td style="color:${diffColor};font-weight:600">${diffName}</td></tr>
      <tr id="${rowId}" style="display:none;background:rgba(56,189,248,.04)"><td></td><td colspan="7" style="padding:8px 12px;font-size:11px;color:var(--text-muted)">
        <b>맵스코어 상세</b> (${md.length}회 플레이)<br>
        ${md.map((d, i) => {
          const gList = (d.gimmickTypes || []).join(', ');
          const gPart = gList ? ` · 기믹: ${gList}` : '';
          return `${i+1}회: base <b>${d.base}</b> → 맵스코어 <b>${d.score}</b> (카드 ${d.field}장${gPart})`;
        }).join('<br>')}
      </td></tr>`;
    }).join('');

  // 난이도 필터 옵션
  const diffOptions = [...new Set(Object.values(byStage).map(v => v.difficulty))].sort();
  const diffFilterOpts = diffOptions.map(d => `<option value="${d}">${DIFF_TIERS[d] || 'Tier '+d}</option>`).join('');

  return `
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;padding:4px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px">
      색상 규칙 — 난이도: <span style="color:#10b981">노말</span> · <span style="color:#f59e0b">하드</span> · <span style="color:#ef4444">슈퍼하드</span>
      &nbsp;|&nbsp; 맵스코어: <span style="color:#10b981">1~700</span> · <span style="color:#f59e0b">701~900</span> · <span style="color:#ef4444">901+</span>
      &nbsp;|&nbsp; 턴수: <span style="color:#10b981">&lt;40</span> · <span style="color:#f59e0b">40~50</span> · <span style="color:#ef4444">&gt;50</span>
      &nbsp;|&nbsp; 행 클릭 → 맵스코어 상세 펼침
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;font-size:12px">
      <span style="color:var(--text-muted)">필터:</span>
      <select id="stg-diff-${gameId}" onchange="filterStages('${gameId}')" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-secondary);font-size:12px">
        <option value="">전체 난이도</option>${diffFilterOpts}
      </select>
      <select id="stg-gold-${gameId}" onchange="filterStages('${gameId}')" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-secondary);font-size:12px">
        <option value="">전체 골드</option>
        <option value="profit">수익 (+)</option>
        <option value="loss">손실 (-)</option>
      </select>
      <select id="stg-ms-${gameId}" onchange="filterStages('${gameId}')" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-secondary);font-size:12px">
        <option value="">전체 맵스코어</option>
        <option value="low">&lt;650 (쉬움)</option>
        <option value="mid">650~800 (보통)</option>
        <option value="high">&gt;800 (어려움)</option>
      </select>
      <select id="stg-turns-${gameId}" onchange="filterStages('${gameId}')" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-secondary);font-size:12px">
        <option value="">전체 턴수</option>
        <option value="low">&lt;40 (효율)</option>
        <option value="mid">40~50</option>
