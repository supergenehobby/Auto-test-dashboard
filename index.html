        <option value="high">&gt;50 (비효율)</option>
      </select>
      <button onclick="resetStageFilters('${gameId}')" style="padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-muted);font-size:11px;cursor:pointer">필터 초기화</button>
      <button onclick="resetStageSort('${gameId}')" style="padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-muted);font-size:11px;cursor:pointer">정렬 원복 ↺</button>
    </div>
    <div class="tbl-wrap"><h4>스테이지별 상세 (${Object.keys(byStage).length}개)</h4>
      <table id="stg-table-${gameId}"><thead><tr>
        <th class="sortable" onclick="sortStageTable('${gameId}',0,'str')">스테이지</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',1,'num')">레벨</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',2,'num')">플레이</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',3,'num')">평균 시간</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',4,'num')">골드 손익</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',5,'num')">평균 턴수</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',6,'num')">맵 스코어</th>
        <th class="sortable" onclick="sortStageTable('${gameId}',7,'str')">난이도</th>
      </tr></thead>
      <tbody>${rows}</tbody></table></div>
  `;
}

/* ══════════════════════════════════════════════
   카테고리: 보안 QA
   ══════════════════════════════════════════════ */
function renderCatSecurity(gameId, runs) {
  // ── 데이터 집계 ──
  const allChecks = [];
  let totalPass = 0, totalFail = 0, apiErrors = 0, apiTotal = 0;
  let critical = 0, warning = 0, info = 0;
  const clientChecks = { xss: [], storage: [], https: [], authority: [] };
  const serverChecks = { headers: [], infoLeak: [], idor: [], apiErr: [] };
  const balanceChecks = { pass: 0, fail: 0, items: [] };

  for (const r of runs) {
    const m = r.metrics || {};
    const sec = m.security;
    if (sec) {
      totalPass += sec.pass_count || 0;
      totalFail += sec.fail_count || 0;
      for (const c of (sec.checks || [])) {
        allChecks.push({ ...c, persona: r.persona, date: r.run_date });
        // 카테고리 분류
        const cat = (c.category || '').toLowerCase();
        if (cat.includes('balance') || (c.name && c.name.includes('입장료'))) {
          if (c.pass) balanceChecks.pass++; else { balanceChecks.fail++; balanceChecks.items.push(c); }
        }
      }
    }
    // web_security 결과 (security_scan에서)
    const ws = (m.security || {}).web_security || m.web_security || {};
    for (const wc of (ws.checks || [])) {
      const sev = wc.severity || 'pass';
      if (sev === 'critical') critical++;
      else if (sev === 'warning') warning++;
      else if (sev === 'info') info++;
      // 클라이언트/서버 분류
      const wCat = (wc.category || '').toLowerCase();
      if (wCat.includes('xss') || wCat.includes('싱크')) clientChecks.xss.push(wc);
      else if (wCat.includes('스토리지') || wCat.includes('storage')) clientChecks.storage.push(wc);
      else if (wCat.includes('https')) clientChecks.https.push(wc);
      else if (wCat.includes('권한') || wCat.includes('authority')) clientChecks.authority.push(wc);
      else if (wCat.includes('헤더') || wCat.includes('header')) serverChecks.headers.push(wc);
      else if (wCat.includes('정보') || wCat.includes('info') || wCat.includes('leakage')) serverChecks.infoLeak.push(wc);
      else if (wCat.includes('idor')) serverChecks.idor.push(wc);
      else if (wCat.includes('api') || wCat.includes('응답')) serverChecks.apiErr.push(wc);
    }
    // API 에러
    const apiS = m.api_summary || {};
    apiTotal += m.api_count || 0;
    apiErrors += apiS.error_count || 0;
    for (const [code, cnt] of Object.entries(apiS.by_status || {})) {
      if (+code >= 400) apiErrors += cnt;
    }
  }

  // 전체 등급 계산
  const totalAll = totalPass + totalFail + critical + warning + info;
  let gradeLabel, gradeColor;
  if (critical > 0) { gradeLabel = 'F'; gradeColor = '#ef4444'; }
  else if (totalFail > 10 || warning > 5) { gradeLabel = 'D'; gradeColor = '#ef4444'; }
  else if (totalFail > 3 || warning > 2) { gradeLabel = 'C'; gradeColor = '#f59e0b'; }
  else if (totalFail > 0 || warning > 0) { gradeLabel = 'B'; gradeColor = '#f59e0b'; }
  else { gradeLabel = 'A'; gradeColor = '#10b981'; }

  // ── 섹션 렌더 헬퍼 ──
  const renderCheckList = (checks, emptyMsg) => {
    if (!checks.length) return `<div style="color:var(--status-ok);font-size:12px;padding:4px 0">${emptyMsg}</div>`;
    return checks.map(c => {
      const sevColor = c.severity === 'critical' ? '#ef4444' : c.severity === 'warning' ? '#f59e0b' : '#3b82f6';
      const icon = c.pass ? '<span style="color:var(--status-ok)">✓</span>' : `<span style="color:${sevColor}">✗</span>`;
      const detail = c.detail || c.name || '';
      const evidence = (c.evidence || []).join(', ');
      return `<div style="font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)">${icon} ${detail}${evidence ? ` <span style="color:var(--text-muted);font-size:10px">${evidence}</span>` : ''}</div>`;
    }).join('');
  };

  return `
    <div style="display:flex;align-items:center;gap:16px;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;margin-bottom:16px">
      <div style="font-size:48px;font-weight:800;color:${gradeColor};min-width:60px;text-align:center">${gradeLabel}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:600;margin-bottom:6px">보안 종합 등급</div>
        <div style="display:flex;gap:16px;font-size:12px;flex-wrap:wrap">
          <span style="color:#ef4444">Critical ${critical}건</span>
          <span style="color:#f59e0b">Warning ${warning + totalFail}건</span>
          <span style="color:var(--status-ok)">Pass ${totalPass}건</span>
          <span style="color:var(--text-muted)">API 에러 ${apiErrors}건 / ${apiTotal.toLocaleString()}</span>
        </div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="tbl-wrap">
        <h4>🖥 클라이언트 보안</h4>
        <div style="margin-bottom:12px">
          <div style="font-weight:600;font-size:12px;color:var(--text-muted);margin-bottom:2px">XSS 위험 요소</div>
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">innerHTML, eval, document.write 등 악성 스크립트 삽입 가능 패턴 검사</div>
          ${renderCheckList(clientChecks.xss, '위험 요소 없음')}
        </div>
        <div style="margin-bottom:12px">
          <div style="font-weight:600;font-size:12px;color:var(--text-muted);margin-bottom:2px">스토리지 민감정보</div>
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">localStorage/sessionStorage에 토큰, 비밀번호 등 민감 데이터 평문 저장 여부</div>
          ${renderCheckList(clientChecks.storage, '민감정보 없음')}
        </div>
        <div style="margin-bottom:12px">
          <div style="font-weight:600;font-size:12px;color:var(--text-muted);margin-bottom:2px">HTTPS 적용 상태</div>
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">모든 API 통신이 HTTPS로 암호화되어 있는지 확인 (HTTP 혼재 시 탈취 위험)</div>
          ${renderCheckList(clientChecks.https, 'HTTPS 정상')}
        </div>
        <div>
          <div style="font-weight:600;font-size:12px;color:var(--text-muted);margin-bottom:2px">클라이언트 권한 검증</div>
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">보상 금액, 난이도 등 서버가 결정해야 할 값을 클라이언트가 직접 전송하는지 감지</div>
          ${renderCheckList(clientChecks.authority, '권한 남용 미감지')}
        </div>
      </div>
      <div class="tbl-wrap">
        <h4>🌐 서버 보안</h4>
        <div style="margin-bottom:12px">
          <div style="font-weight:600;font-size:12px;color:var(--text-muted);margin-bottom:2px">보안 헤더 상태</div>
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">X-Frame-Options(클릭재킹), X-Content-Type-Options(MIME 스니핑), HSTS, CSP 필수 헤더 존재 확인</div>
          ${renderCheckList(serverChecks.headers, '필수 헤더 확인 불가 (응답 헤더 미수집)')}
        </div>
        <div style="margin-bottom:12px">
          <div style="font-weight:600;font-size:12px;color:var(--text-muted);margin-bottom:2px">서버 정보 노출</div>
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">Server, X-Powered-By 헤더에 서버 종류/버전이 노출되면 공격자가 취약점을 특정할 수 있음</div>
          ${renderCheckList(serverChecks.infoLeak, '정보 노출 없음')}
        </div>
        <div style="margin-bottom:12px">
          <div style="font-weight:600;font-size:12px;color:var(--text-muted);margin-bottom:2px">API 에러 빈도</div>
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">4xx/5xx 에러 비율이 높으면 비정상 요청 또는 서버 불안정 의심</div>
          ${apiErrors ? `<div style="font-size:12px;color:var(--status-err)">에러 ${apiErrors}건 / 총 ${apiTotal.toLocaleString()}건 (${(apiErrors/apiTotal*100).toFixed(1)}%)</div>` : '<div style="font-size:12px;color:var(--status-ok)">API 에러 없음</div>'}
        </div>
        <div>
          <div style="font-weight:600;font-size:12px;color:var(--text-muted);margin-bottom:2px">IDOR 패턴 감지</div>
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">URL/Body에 순차 정수 ID(user_id=1001)가 있으면 타인 데이터에 접근 가능한 취약점</div>
          ${renderCheckList(serverChecks.idor, 'IDOR 패턴 미감지')}
        </div>
      </div>
    </div>
    <div class="tbl-wrap">
      <h4>밸런스 검증 (입장료·보상)</h4>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <span class="badge ${balanceChecks.fail === 0 ? 'badge-ok' : 'badge-err'}">${balanceChecks.fail === 0 ? 'PASS' : 'FAIL'}</span>
        <span style="font-size:12px;color:var(--text-muted)">통과 ${balanceChecks.pass} / 실패 ${balanceChecks.fail}</span>
      </div>
      ${balanceChecks.items.length ? balanceChecks.items.map(c =>
        `<div style="font-size:12px;color:var(--status-err);padding:2px 0">✗ ${c.name || ''} — 예상: ${c.expected}, 실제: ${c.actual}</div>`
      ).join('') : '<div style="font-size:12px;color:var(--status-ok)">모든 검증 통과</div>'}
    </div>
    <div class="tbl-wrap">
      <h4>상세 증거 리스트</h4>
      ${allChecks.filter(c => !c.pass).length ? allChecks.filter(c => !c.pass).map(c =>
        `<div style="font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);color:var(--text-secondary)">
          <span style="color:var(--status-err)">✗</span>
          <span style="color:var(--text-muted)">[${c.category || '?'}]</span>
          ${c.name || ''} ${c.detail ? '— ' + c.detail : ''}
          <span style="color:var(--text-muted);font-size:10px">(${c.date || ''} ${c.persona || ''})</span>
        </div>`
      ).join('') : '<div style="font-size:12px;color:var(--status-ok);padding:8px 0">실패 항목 없음</div>'}
    </div>
  `;
}

/* ══════════════════════════════════════════════
   카테고리: 로그 & API
   ══════════════════════════════════════════════ */
function renderCatLogApi(gameId, runs) {
  let totalApi = 0, totalConsole = 0;
  const byMethod = {};
  const topUrls = {};
  const byLevel = {};

  for (const r of runs) {
    const m = r.metrics || {};
    totalApi += m.api_count || 0;
    totalConsole += m.console_count || 0;

    const apiS = m.api_summary || {};
    for (const [method, cnt] of Object.entries(apiS.by_method || {})) {
      byMethod[method] = (byMethod[method] || 0) + cnt;
    }
    for (const [url, cnt] of Object.entries(apiS.top_urls || {})) {
      topUrls[url] = (topUrls[url] || 0) + cnt;
    }

    const conS = m.console_summary || {};
    for (const [lvl, cnt] of Object.entries(conS.by_level || {})) {
      byLevel[lvl] = (byLevel[lvl] || 0) + cnt;
    }
  }

  const avgApi = runs.length ? Math.round(totalApi / runs.length) : 0;
  const avgConsole = runs.length ? Math.round(totalConsole / runs.length) : 0;

  const methodRows = Object.entries(byMethod).sort(([,a],[,b]) => b - a)
    .map(([m, c]) => `<tr><td>${m}</td><td>${c.toLocaleString()}</td><td>${totalApi ? (c / totalApi * 100).toFixed(1) : 0}%</td></tr>`).join('');

  const urlRows = Object.entries(topUrls).sort(([,a],[,b]) => b - a).slice(0, 10)
    .map(([url, c]) => {
      const short = url.length > 60 ? url.slice(0, 57) + '...' : url;
      return `<tr><td style="font-size:11px;word-break:break-all">${short}</td><td>${c.toLocaleString()}</td></tr>`;
    }).join('');

  const levelColors = { log: 'var(--text-muted)', warn: 'var(--status-warn)', error: 'var(--status-err)', info: '#3b82f6', debug: '#8b5cf6' };
  const levelRows = Object.entries(byLevel).sort(([,a],[,b]) => b - a)
    .map(([lvl, c]) => `<tr><td style="color:${levelColors[lvl] || 'var(--text-secondary)'}">${lvl}</td><td>${c.toLocaleString()}</td><td>${totalConsole ? (c / totalConsole * 100).toFixed(1) : 0}%</td></tr>`).join('');

  const apiNote = totalApi === 0 ? `<div style="font-size:11px;color:var(--text-muted);padding:6px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;margin-bottom:12px">ℹ️ API 호출 0건 — 이 게임은 자체 API 서버 대신 Facebook Instant Games 프레임워크를 통해 통신하므로 별도 API 로그가 수집되지 않습니다.</div>` : '';

  return `
    ${apiNote}
    <div class="metric-row">
      <div class="metric-box"><div class="label">총 API 호출</div><div class="value">${totalApi.toLocaleString()}</div><div class="sub">런당 평균 ${avgApi}</div></div>
      <div class="metric-box"><div class="label">총 콘솔 로그</div><div class="value">${totalConsole.toLocaleString()}</div><div class="sub">런당 평균 ${avgConsole}</div></div>
      <div class="metric-box"><div class="label">총 런</div><div class="value">${runs.length}</div></div>
    </div>
    <div class="chart-grid">
      <div class="tbl-wrap"><h4>API 메서드별</h4>
        <table><thead><tr><th>메서드</th><th>건수</th><th>비율</th></tr></thead>
        <tbody>${methodRows || '<tr><td colspan="3" style="color:var(--text-muted)">데이터 없음</td></tr>'}</tbody></table></div>
      <div class="tbl-wrap"><h4>콘솔 레벨별</h4>
        <table><thead><tr><th>레벨</th><th>건수</th><th>비율</th></tr></thead>
        <tbody>${levelRows || '<tr><td colspan="3" style="color:var(--text-muted)">데이터 없음</td></tr>'}</tbody></table></div>
    </div>
    <div class="tbl-wrap"><h4>상위 API URL (Top 10)</h4>
      <table><thead><tr><th>URL</th><th>건수</th></tr></thead>
      <tbody>${urlRows || '<tr><td colspan="2" style="color:var(--text-muted)">데이터 없음</td></tr>'}</tbody></table></div>
  `;
}

/* ══════════════════════════════════════════════
   카테고리: 성능 (대폭 강화)
   ══════════════════════════════════════════════ */
function renderCatPerf(gameId, runs) {
  const perfs = runs.map(r => (r.metrics || {}).perf).filter(Boolean);
  if (!perfs.length) return '<div style="color:var(--text-muted);padding:20px">성능 데이터 없음</div>';

  // snapshots 수집
  const allSnaps = [];
  for (const p of perfs) {
    for (const s of (p.snapshots || [])) {
      if (s.cdp) allSnaps.push({
        level: s.level, tag: s.tag,
        heap: s.cdp.js_heap_used || 0,
        heapTotal: s.cdp.js_heap_total || 0,
        dom: s.cdp.dom_nodes || 0,
        listeners: s.cdp.js_event_listeners || 0,
        taskDuration: s.cdp.task_duration || 0,
        timestamp: s.timestamp || 0,
      });
    }
  }
  if (!allSnaps.length) return '<div style="color:var(--text-muted);padding:20px">스냅샷 데이터 없음</div>';

  const fmtMB = (v) => (v / 1048576).toFixed(1);

  // 레벨별 start/end 분리
  const starts = allSnaps.filter(s => s.tag === 'level_start').sort((a,b) => a.level - b.level);
  const ends = allSnaps.filter(s => s.tag === 'level_end').sort((a,b) => a.level - b.level);

  // 메트릭 카드 1행: 시작/종료/총증가
  const firstStart = starts.length ? starts[0] : null;
  const lastEnd = ends.length ? ends[ends.length - 1] : null;
  const startMB = firstStart ? fmtMB(firstStart.heap) : '-';
  const endMB = lastEnd ? fmtMB(lastEnd.heap) : '-';
  const totalGrowth = (firstStart && lastEnd) ? (lastEnd.heap - firstStart.heap) : 0;
  const totalGrowthMB = fmtMB(Math.abs(totalGrowth));
  const growthSign = totalGrowth >= 0 ? '+' : '-';
  const growthColor = totalGrowth > 0 ? 'var(--status-err)' : 'var(--status-ok)';

  // 메트릭 카드 2행: 레벨당 평균 증가, 피크 메모리, CPU 부하
  const levelDeltas = [];
  const levelSet = new Set(starts.map(s => s.level));
  for (const lvl of levelSet) {
    const ls = starts.find(s => s.level === lvl);
    const le = ends.find(s => s.level === lvl);
    if (ls && le) levelDeltas.push({ level: lvl, delta: le.heap - ls.heap, endHeap: le.heap });
  }
  const avgDeltaMB = levelDeltas.length ? fmtMB(levelDeltas.reduce((a,d) => a + d.delta, 0) / levelDeltas.length) : '-';
  const peakHeap = allSnaps.reduce((mx, s) => Math.max(mx, s.heap), 0);
  const peakMB = fmtMB(peakHeap);
  const avgTaskDur = allSnaps.length ? (allSnaps.reduce((a,s) => a + s.taskDuration, 0) / allSnaps.length).toFixed(3) : '-';

  // 누수 진단: 전반부 vs 후반부
  const halfIdx = Math.floor(ends.length / 2);
  const firstHalf = ends.slice(0, halfIdx);
  const secondHalf = ends.slice(halfIdx);
  const firstHalfAvg = firstHalf.length ? firstHalf.reduce((a,s) => a + s.heap, 0) / firstHalf.length : 0;
  const secondHalfAvg = secondHalf.length ? secondHalf.reduce((a,s) => a + s.heap, 0) / secondHalf.length : 0;
  const leakPct = firstHalfAvg > 0 ? ((secondHalfAvg - firstHalfAvg) / firstHalfAvg * 100).toFixed(1) : '0';
  const leakColor = +leakPct >= 20 ? 'var(--status-err)' : +leakPct >= 10 ? 'var(--status-warn)' : 'var(--status-ok)';
  const leakBarWidth = Math.min(100, Math.max(5, Math.abs(+leakPct)));

  // 메모리 급증 Top 3
  const top3 = [...levelDeltas].sort((a,b) => b.delta - a.delta).slice(0, 3);
  const top3Rows = top3.map(d =>
    `<tr><td>Lv${d.level}</td><td style="color:var(--status-err)">+${fmtMB(d.delta)} MB</td><td>${fmtMB(d.endHeap)} MB</td></tr>`
  ).join('');

  // DOM / 리스너
  const firstDom = firstStart ? firstStart.dom : 0;
  const lastDom = lastEnd ? lastEnd.dom : 0;
  const avgListeners = allSnaps.length ? Math.round(allSnaps.reduce((a,s) => a + s.listeners, 0) / allSnaps.length) : 0;

  return `
    <div class="metric-row">
      <div class="metric-box"><div class="label">시작 메모리</div><div class="value">${startMB} MB</div><div class="sub">첫 레벨 시작 시 JS Heap</div></div>
      <div class="metric-box"><div class="label">종료 메모리</div><div class="value">${endMB} MB</div><div class="sub">마지막 레벨 종료 시 JS Heap</div></div>
      <div class="metric-box"><div class="label">총 증가량</div><div class="value" style="color:${growthColor}">${growthSign}${totalGrowthMB} MB</div></div>
    </div>
    <div class="metric-row">
      <div class="metric-box"><div class="label">레벨당 평균 증가</div><div class="value">${avgDeltaMB} MB</div></div>
      <div class="metric-box"><div class="label">피크 메모리</div><div class="value">${peakMB} MB</div></div>
      <div class="metric-box"><div class="label">CPU 부하 (task_duration)</div><div class="value">${avgTaskDur}초</div><div class="sub">스냅샷 평균</div></div>
    </div>
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px">
      <h4 style="font-size:14px;color:var(--text-secondary);margin-bottom:12px">누수 진단</h4>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">
        <div style="font-size:12px;color:var(--text-muted)">전반부 평균: <b style="color:var(--text-primary)">${fmtMB(firstHalfAvg)} MB</b></div>
        <div style="font-size:16px;color:var(--text-muted)">→</div>
        <div style="font-size:12px;color:var(--text-muted)">후반부 평균: <b style="color:var(--text-primary)">${fmtMB(secondHalfAvg)} MB</b></div>
        <div style="font-size:14px;font-weight:700;color:${leakColor}">${leakPct}%</div>
      </div>
      <div class="leak-gauge">
        <div class="leak-gauge-fill" style="width:${leakBarWidth}%;background:${leakColor}">${leakPct}%</div>
      </div>
      ${+leakPct >= 20 ? '<div style="font-size:12px;color:var(--status-err);margin-top:4px">⚠ 후반부 메모리가 20% 이상 증가 — 메모리 누수 의심</div>' : '<div style="font-size:12px;color:var(--status-ok);margin-top:4px">메모리 증가 정상 범위</div>'}
    </div>
    ${top3.length ? `<div class="tbl-wrap"><h4>메모리 급증 Top 3</h4>
      <table><thead><tr><th>레벨</th><th>힙 증가</th><th>종료 힙</th></tr></thead>
      <tbody>${top3Rows}</tbody></table></div>` : ''}
    <div class="metric-row">
      <div class="metric-box"><div class="label">DOM 노드 변화</div><div class="value">${firstDom.toLocaleString()} → ${lastDom.toLocaleString()}</div><div class="sub">첫 레벨 → 마지막 레벨</div></div>
      <div class="metric-box"><div class="label">평균 이벤트 리스너 수</div><div class="value">${avgListeners.toLocaleString()}</div></div>
    </div>
    <div class="chart-grid" style="grid-template-columns:1fr 1fr 1fr">
      <div class="chart-box"><h4>레벨별 메모리 사용량</h4><canvas id="chart-perf-mem-${gameId}"></canvas></div>
      <div class="chart-box"><h4>레벨별 DOM 수 변화</h4><canvas id="chart-perf-dom-${gameId}"></canvas></div>
      <div class="chart-box"><h4>레벨별 CPU 부하</h4><canvas id="chart-perf-cpu-${gameId}"></canvas></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>경과시간별 메모리 변화</h4><canvas id="chart-perf-timemem-${gameId}"></canvas></div>
      <div class="chart-box"><h4>경과시간별 CPU 부하</h4><canvas id="chart-perf-timecpu-${gameId}"></canvas></div>
    </div>
  `;
}

function renderPerfCharts(gameId, runs) {
  const perfs = runs.map(r => (r.metrics || {}).perf).filter(Boolean);
  const allSnaps = [];
  for (const p of perfs) {
    for (const s of (p.snapshots || [])) {
      if (s.cdp) allSnaps.push({
        level: s.level, tag: s.tag,
        heap: s.cdp.js_heap_used || 0,
        dom: s.cdp.dom_nodes || 0,
        listeners: s.cdp.js_event_listeners || 0,
        taskDuration: s.cdp.task_duration || 0,
        timestamp: s.timestamp || 0,
      });
    }
  }
  if (!allSnaps.length) return;

  const starts = allSnaps.filter(s => s.tag === 'level_start').sort((a,b) => a.level - b.level);
  const ends = allSnaps.filter(s => s.tag === 'level_end').sort((a,b) => a.level - b.level);
  const levels = [...new Set(allSnaps.map(s => s.level))].sort((a,b) => a - b);

  const fmtMB = (v) => +(v / 1048576).toFixed(1);

  // 1) 레벨별 메모리 (이중축: 시작/종료 힙 + 레벨당 증감)
  const memStartData = levels.map(l => { const s = starts.find(x => x.level === l); return s ? fmtMB(s.heap) : null; });
  const memEndData = levels.map(l => { const s = ends.find(x => x.level === l); return s ? fmtMB(s.heap) : null; });
  const memDeltaData = levels.map(l => {
    const ls = starts.find(x => x.level === l);
    const le = ends.find(x => x.level === l);
    return (ls && le) ? fmtMB(le.heap - ls.heap) : null;
  });

  const memKey = `perf-mem-${gameId}`;
  if (_charts[memKey]) _charts[memKey].destroy();
  const memCanvas = document.getElementById(`chart-perf-mem-${gameId}`);
  if (memCanvas) {
    _charts[memKey] = new Chart(memCanvas, {
      type: 'line',
      data: {
        labels: levels.map(l => `Lv${l}`),
        datasets: [
          { label: '시작 Heap (MB)', data: memStartData, borderColor: '#3b82f6', backgroundColor: '#3b82f622', tension: 0.3, fill: false, yAxisID: 'y' },
          { label: '종료 Heap (MB)', data: memEndData, borderColor: '#ef4444', backgroundColor: '#ef444422', tension: 0.3, fill: false, yAxisID: 'y' },
          { label: '증감 (MB)', data: memDeltaData, borderColor: '#f59e0b', backgroundColor: '#f59e0b55', type: 'bar', borderRadius: 3, yAxisID: 'y1' },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          y: { position: 'left', title: { display: true, text: 'Heap (MB)' } },
          y1: { position: 'right', title: { display: true, text: '증감 (MB)' }, grid: { drawOnChartArea: false } },
        },
        plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
      },
    });
  }

  // 2) 레벨별 DOM 수 변화 (시작/종료)
  const domStartData = levels.map(l => { const s = starts.find(x => x.level === l); return s ? s.dom : null; });
  const domEndData = levels.map(l => { const s = ends.find(x => x.level === l); return s ? s.dom : null; });

  const domKey = `perf-dom-${gameId}`;
  if (_charts[domKey]) _charts[domKey].destroy();
  const domCanvas = document.getElementById(`chart-perf-dom-${gameId}`);
  if (domCanvas) {
    _charts[domKey] = new Chart(domCanvas, {
      type: 'line',
      data: {
        labels: levels.map(l => `Lv${l}`),
        datasets: [
          { label: '시작 DOM', data: domStartData, borderColor: '#10b981', tension: 0.3, fill: false },
          { label: '종료 DOM', data: domEndData, borderColor: '#f59e0b', tension: 0.3, fill: false },
        ],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } } },
    });
  }

  // 3) 레벨별 CPU 부하 (task_duration)
  const cpuStartData = levels.map(l => { const s = starts.find(x => x.level === l); return s ? +s.taskDuration.toFixed(3) : null; });
  const cpuEndData = levels.map(l => { const s = ends.find(x => x.level === l); return s ? +s.taskDuration.toFixed(3) : null; });

  const cpuKey = `perf-cpu-${gameId}`;
  if (_charts[cpuKey]) _charts[cpuKey].destroy();
  const cpuCanvas = document.getElementById(`chart-perf-cpu-${gameId}`);
  if (cpuCanvas) {
    _charts[cpuKey] = new Chart(cpuCanvas, {
      type: 'bar',
      data: {
        labels: levels.map(l => `Lv${l}`),
        datasets: [
          { label: '시작 시 task_duration', data: cpuStartData, backgroundColor: '#3b82f699', borderColor: '#3b82f6', borderWidth: 1, borderRadius: 3 },
          { label: '종료 시 task_duration', data: cpuEndData, backgroundColor: '#ef444499', borderColor: '#ef4444', borderWidth: 1, borderRadius: 3 },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { title: { display: true, text: '초' } } },
        plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
      },
    });
  }

  // 4) 경과시간별 메모리 변화 (x축: 분)
  const baseTime = allSnaps.length ? Math.min(...allSnaps.filter(s => s.timestamp).map(s => s.timestamp)) : 0;
  const timeSnaps = allSnaps.filter(s => s.timestamp).sort((a,b) => a.timestamp - b.timestamp);

  if (timeSnaps.length && baseTime) {
    const timeMemLabels = timeSnaps.map(s => ((s.timestamp - baseTime) / 60).toFixed(1));
    const timeMemData = timeSnaps.map(s => fmtMB(s.heap));

    const tmKey = `perf-timemem-${gameId}`;
    if (_charts[tmKey]) _charts[tmKey].destroy();
    const tmCanvas = document.getElementById(`chart-perf-timemem-${gameId}`);
    if (tmCanvas) {
      _charts[tmKey] = new Chart(tmCanvas, {
        type: 'line',
        data: { labels: timeMemLabels, datasets: [{ label: 'Heap (MB)', data: timeMemData, borderColor: '#8b5cf6', tension: 0.3, fill: true, backgroundColor: '#8b5cf622' }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { x: { title: { display: true, text: '경과 (분)' }, ticks: { maxTicksLimit: 15 } } },
          plugins: { legend: { display: false } },
        },
      });
    }

    const timeCpuData = timeSnaps.map(s => +s.taskDuration.toFixed(3));
    const tcKey = `perf-timecpu-${gameId}`;
    if (_charts[tcKey]) _charts[tcKey].destroy();
    const tcCanvas = document.getElementById(`chart-perf-timecpu-${gameId}`);
    if (tcCanvas) {
      _charts[tcKey] = new Chart(tcCanvas, {
        type: 'line',
        data: { labels: timeMemLabels, datasets: [{ label: 'task_duration (초)', data: timeCpuData, borderColor: '#ec4899', tension: 0.3, fill: true, backgroundColor: '#ec489922' }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { x: { title: { display: true, text: '경과 (분)' }, ticks: { maxTicksLimit: 15 } } },
          plugins: { legend: { display: false } },
        },
      });
    }
  }
}

function _chartBar(gameId, suffix, labels, colors, data, unit, label) {

}

/* ── 테마/글자 크기 ── */

const FS_STEPS = [0.8, 0.9, 1.0, 1.1, 1.2, 1.35];
let fsIdx = parseInt(localStorage.getItem('db_fs_idx') || '2');

function changeFontSize(dir) {
  fsIdx = Math.max(0, Math.min(FS_STEPS.length - 1, fsIdx + dir));
  localStorage.setItem('db_fs_idx', fsIdx);
  document.documentElement.style.setProperty('--fs-scale', FS_STEPS[fsIdx]);
}

function getTheme() { return localStorage.getItem('db_theme') || 'dark'; }
function toggleTheme() {
  const t = getTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('db_theme', t);
  applyTheme(t);
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀' : '☾';
}

/* ── 스테이지 정렬 ── */

const _stgSortState = {};

function sortStageTable(gameId, colIdx, type) {
  const table = document.getElementById(`stg-table-${gameId}`);
  if (!table) return;
  const tbody = table.querySelector('tbody');
  // 데이터 행만 (상세행 제외)
  const dataRows = [...tbody.querySelectorAll('tr')].filter(r => !r.id || !r.id.startsWith('ms_'));
  const detailRows = [...tbody.querySelectorAll('tr')].filter(r => r.id && r.id.startsWith('ms_'));
  const key = `${gameId}-${colIdx}`;
  const asc = _stgSortState[key] = !_stgSortState[key];

  dataRows.sort((a, b) => {
    const aText = a.querySelectorAll('td')[colIdx]?.textContent.trim() || '';
    const bText = b.querySelectorAll('td')[colIdx]?.textContent.trim() || '';
    if (type === 'num') {
      const aNum = parseFloat(aText.replace(/[^0-9.\-]/g, '')) || 0;
      const bNum = parseFloat(bText.replace(/[^0-9.\-]/g, '')) || 0;
      return asc ? aNum - bNum : bNum - aNum;
    }
    return asc ? aText.localeCompare(bText) : bText.localeCompare(aText);
  });
  // 데이터행 + 상세행 쌍으로 재배치
  dataRows.forEach(r => {
    tbody.appendChild(r);
    const st = r.querySelectorAll('td')[0]?.textContent.trim();
    const detail = detailRows.find(d => d.id === `ms_${gameId}_${st}`);
    if (detail) tbody.appendChild(detail);
  });

  // 헤더 표시 업데이트
  table.querySelectorAll('th.sortable').forEach((th, i) => {
    th.textContent = th.textContent.replace(/ [▲▼]/g, '');
    if (i === colIdx) th.textContent += asc ? ' ▲' : ' ▼';
  });
}

function resetStageSort(gameId) {
  const table = document.getElementById(`stg-table-${gameId}`);
  if (!table) return;
  const tbody = table.querySelector('tbody');
  // data-row가 없으면 원본 순서 기준 = 레벨 번호 오름차순
  const rows = [...tbody.querySelectorAll('tr')].filter(r => !r.id || !r.id.startsWith('ms_'));
  const detailRows = [...tbody.querySelectorAll('tr')].filter(r => r.id && r.id.startsWith('ms_'));
  rows.sort((a, b) => {
    const aLv = parseInt(a.querySelectorAll('td')[1]?.textContent.replace(/[^0-9]/g, '')) || 0;
    const bLv = parseInt(b.querySelectorAll('td')[1]?.textContent.replace(/[^0-9]/g, '')) || 0;
    return aLv - bLv;
  });
  // 각 행 뒤에 상세행 배치
  rows.forEach(r => {
    tbody.appendChild(r);
    const cells = r.querySelectorAll('td');
    const st = cells[0]?.textContent.trim();
    const detail = detailRows.find(d => d.id === `ms_${gameId}_${st}`);
    if (detail) tbody.appendChild(detail);
  });
  // 헤더 화살표 제거
  table.querySelectorAll('th.sortable').forEach(th => {
    th.textContent = th.textContent.replace(/ [▲▼]/g, '');
  });
  // 정렬 상태 초기화
  Object.keys(_stgSortState).forEach(k => { if (k.startsWith(gameId)) delete _stgSortState[k]; });
}

/* ── 스테이지 필터 ── */

function filterStages(gameId) {
  const diffVal = document.getElementById(`stg-diff-${gameId}`)?.value || '';
  const goldVal = document.getElementById(`stg-gold-${gameId}`)?.value || '';
  const msVal = document.getElementById(`stg-ms-${gameId}`)?.value || '';
  const turnsVal = document.getElementById(`stg-turns-${gameId}`)?.value || '';
  const table = document.getElementById(`stg-table-${gameId}`);
  if (!table) return;

  const rows = table.querySelectorAll('tbody tr');
  rows.forEach(row => {
    const cells = row.querySelectorAll('td');
    if (cells.length < 8) return;
    const turns = parseFloat(cells[4].textContent) || 0;
    const ms = parseInt(cells[5].textContent) || 0;
    const gold = parseInt(cells[6].textContent.replace(/,/g, '')) || 0;
    const diffText = cells[7].textContent.trim();

    let show = true;
    // 난이도 필터
    if (diffVal && DIFF_TIERS[diffVal] !== diffText) show = false;
    // 골드 필터
    if (goldVal === 'profit' && gold < 0) show = false;
    if (goldVal === 'loss' && gold >= 0) show = false;
    // 맵스코어 필터
    if (msVal === 'low' && ms >= 650) show = false;
    if (msVal === 'mid' && (ms < 650 || ms > 800)) show = false;
    if (msVal === 'high' && ms <= 800) show = false;
    // 턴수 필터
    if (turnsVal === 'low' && turns >= 40) show = false;
    if (turnsVal === 'mid' && (turns < 40 || turns > 50)) show = false;
    if (turnsVal === 'high' && turns <= 50) show = false;

    row.style.display = show ? '' : 'none';
  });
}

function resetStageFilters(gameId) {
  ['diff', 'gold', 'ms', 'turns'].forEach(f => {
    const el = document.getElementById(`stg-${f}-${gameId}`);
    if (el) el.value = '';
  });
  filterStages(gameId);
}

/* ── 런 관리 ── */

function renderRunManager(runs) {
  const el = document.getElementById('run-manager');
  if (!el) return;
  // 날짜 범위 기본값
  const dates = runs.map(r => r.run_date).filter(Boolean);
  const minDate = dates.length ? dates.reduce((a, b) => a < b ? a : b) : '';
  const maxDate = dates.length ? dates.reduce((a, b) => a > b ? a : b) : '';

  // 게임 목록 수집
  const rmGames = [...new Set(runs.map(r => r.game_id).filter(Boolean))].sort();
  const gameOpts = rmGames.map(g => `<option value="${g}">${g}</option>`).join('');

  el.innerHTML = `
    <div class="tbl-wrap">
      <h4>런 데이터 관리</h4>
      <div class="rm-date-filter">
        <span style="color:var(--text-muted)">게임:</span>
        <select id="rm-game" onchange="filterRunManager()" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-secondary);font-size:12px">
          <option value="">전체</option>${gameOpts}
        </select>
        <span style="color:var(--text-muted)">기간:</span>
        <input type="date" id="rm-from" value="${minDate}" onchange="filterRunManager()">
        <span>~</span>
        <input type="date" id="rm-to" value="${maxDate}" onchange="filterRunManager()">
        <button class="rm-btn" onclick="filterRunManager()">조회</button>
        <label style="margin-left:auto;color:var(--text-muted)"><input type="checkbox" id="rm-select-all" onclick="toggleAllRuns(this.checked)"> 전체 선택</label>
      </div>
      <div id="rm-list"></div>
      <div class="rm-actions">
        <button class="rm-btn rm-btn-danger" onclick="deleteSelectedRuns()">선택 삭제</button>
        <span id="rm-status" style="font-size:11px;color:var(--text-muted)"></span>
      </div>
    </div>
  `;
  filterRunManager();
}

function filterRunManager() {
  const from = document.getElementById('rm-from')?.value || '';
  const to = document.getElementById('rm-to')?.value || '';
  const gameFilter = document.getElementById('rm-game')?.value || '';
  const listEl = document.getElementById('rm-list');
  if (!listEl) return;

  const filtered = _allRuns.filter(r => {
    if (from && r.run_date < from) return false;
    if (to && r.run_date > to) return false;
    if (gameFilter && r.game_id !== gameFilter) return false;
    return true;
  }).sort((a, b) => {
    if (a.game_id !== b.game_id) return a.game_id.localeCompare(b.game_id);
    if (a.run_date !== b.run_date) return b.run_date.localeCompare(a.run_date);
    return (PERSONA_ORDER.indexOf(a.persona)===-1?99:PERSONA_ORDER.indexOf(a.persona)) - (PERSONA_ORDER.indexOf(b.persona)===-1?99:PERSONA_ORDER.indexOf(b.persona));
  });

  if (!filtered.length) {
    listEl.innerHTML = '<div style="color:var(--text-muted);padding:8px;font-size:12px">해당 조건에 데이터 없음</div>';
    return;
  }

  listEl.innerHTML = filtered.map(r => {
    const m = r.metrics || {};
    const pColor = PERSONA_COLORS[r.persona] || '#999';
    const pName = PERSONA_KO[r.persona] || r.persona;
    const goldPnl = m.gold_pnl != null ? m.gold_pnl.toLocaleString() : '-';
    const goldColor = (m.gold_pnl || 0) >= 0 ? 'var(--status-ok)' : 'var(--status-err)';
    return `<div class="rm-row" data-run-id="${r.id}">
      <input type="checkbox" class="rm-check" value="${r.id}">
      <span style="font-weight:600;min-width:36px;color:var(--text-muted)">${r.game_id}</span>
      <span style="min-width:80px">${r.run_date}</span>
      <span style="color:${pColor};font-weight:600;min-width:40px">${pName}</span>
      <span style="min-width:50px">${r.levels_played}판</span>
      <span style="color:${goldColor};min-width:70px">골드 ${goldPnl}</span>
      <span style="color:var(--text-muted);min-width:50px">${r.total_time_sec ? Math.round(r.total_time_sec) + '초' : '-'}</span>
      <span style="color:var(--text-muted);font-size:10px">${r.id.slice(0, 8)}</span>
    </div>`;
  }).join('');

  document.getElementById('rm-status').textContent = `${filtered.length}건 표시`;
  const selectAll = document.getElementById('rm-select-all');
  if (selectAll) selectAll.checked = false;
}

function toggleAllRuns(checked) {
  document.querySelectorAll('.rm-check').forEach(cb => cb.checked = checked);
}

async function deleteSelectedRuns() {
  const checked = [...document.querySelectorAll('.rm-check:checked')].map(cb => cb.value);
  if (!checked.length) { alert('삭제할 런을 선택해주세요.'); return; }
  if (!confirm(`${checked.length}건의 런을 삭제하시겠습니까?\n(stage_results도 함께 삭제됩니다. 복구 불가)`)) return;

  const statusEl = document.getElementById('rm-status');
  statusEl.textContent = '삭제 중...';
  let deleted = 0, failed = 0;
  for (const runId of checked) {
    try {
      await sb.rpc('delete_freeplay_run', { target_id: runId });
      deleted++;
    } catch (e) {
      console.error('삭제 실패:', runId, e);
      failed++;
    }
  }
  statusEl.textContent = `삭제 완료: ${deleted}건 성공${failed ? `, ${failed}건 실패` : ''}`;
  // 데이터 갱신
  _allRuns = _allRuns.filter(r => !checked.includes(r.id));
  const games = aggregateOverview(_allRuns);
  renderOverview(games);
  renderCronHistory(await fetchCronHistory());
}

/* ── 크론 이력 삭제 ── */

async function deleteSelectedCron() {
  const checked = [...document.querySelectorAll('.cron-check:checked')].map(cb => cb.value);
  if (!checked.length) { alert('삭제할 크론 이력을 선택해주세요.'); return; }
  if (!confirm(`${checked.length}건의 크론 이력을 삭제하시겠습니까?`)) return;

  const statusEl = document.getElementById('cron-status');
  statusEl.textContent = '삭제 중...';
  let deleted = 0, failed = 0;
  for (const cronId of checked) {
    try {
      await sb.rpc('delete_cron_history', { target_id: cronId });
      deleted++;
    } catch (e) {
      console.error('크론 삭제 실패:', cronId, e);
      failed++;
    }
  }
  statusEl.textContent = `삭제 완료: ${deleted}건${failed ? `, 실패 ${failed}건` : ''}`;
  // 갱신
  const cron = await fetchCronHistory();
  renderCronHistory(cron);
}

/* ── CSV 다운로드 ── */

function downloadCSV() {
  if (!_allRuns.length) return;
  const header = 'game_id,persona,run_date,levels_played,total_time_sec\n';
  const csvRows = _allRuns.map(r =>
    `${r.game_id},${r.persona},${r.run_date},${r.levels_played},${r.total_time_sec || ''}`
  ).join('\n');
  const blob = new Blob([header + csvRows], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `freeplay_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
}

/* ── 초기화 ── */

async function init() {
  const loadingEl = document.getElementById('loading');
  const errorEl = document.getElementById('error');
  const overviewEl = document.getElementById('overview-panel');

  applyTheme(getTheme());
  document.documentElement.style.setProperty('--fs-scale', FS_STEPS[fsIdx]);

  try {
    loadingEl.style.display = 'flex';
    errorEl.style.display = 'none';
    overviewEl.style.display = 'none';

    const [runs, cron, gameConfigs] = await Promise.all([fetchRuns(), fetchCronHistory(), fetchGameConfigs()]);
    _allRuns = runs;
    _gameConfigs = gameConfigs;

    const games = aggregateOverview(runs);
    renderOverview(games);
    renderCronHistory(cron);
    renderGameTabs(Object.keys(games));

    document.getElementById('update-time').textContent = '갱신: ' + new Date().toLocaleString('ko');
    loadingEl.style.display = 'none';
  } catch (e) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'flex';
    errorEl.innerHTML = `
      <div class="icon">⚠️</div>
      <div style="font-size:16px;font-weight:600;">데이터 로딩 실패</div>
      <div style="font-size:13px;">${e.message}</div>
      <button onclick="init()">재시도</button>
    `;
  }
}

document.addEventListener('DOMContentLoaded', init);

/* ═══════════════════════════════════════════════════════
   레이아웃 편집
   ═══════════════════════════════════════════════════════ */

let _editMode = false;
let _sortables = [];

function toggleEditMode() {
  _editMode = !_editMode;
  document.body.classList.toggle('edit-mode', _editMode);
  document.getElementById('editBar').classList.toggle('active', _editMode);
  document.getElementById('editBtn').style.background = _editMode ? '#3b82f6' : '';
  document.getElementById('editBtn').style.color = _editMode ? '#fff' : '';

  if (_editMode) {
    _initSortables();
  } else {
    _destroySortables();
    _saveLayout();
  }
}

function _initSortables() {
  _destroySortables();
  _wrapSections(document.getElementById('overview-panel'));
  document.querySelectorAll('.cat-panel.active').forEach(p => _wrapSections(p));
  document.querySelectorAll('.layout-container').forEach(el => {
    _sortables.push(new Sortable(el, {
      handle: '.section-handle',
      animation: 150,
      ghostClass: 'sortable-ghost',
      onEnd: () => _saveLayout(),
    }));
  });
}

function _wrapSections(container) {
  if (!container || container.querySelector('.layout-container')) return;
  const children = [...container.children].filter(el => el.tagName !== 'STYLE');
  const wrapper = document.createElement('div');
  wrapper.className = 'layout-container';
  children.forEach((child, i) => {
    if (child.classList.contains('layout-section')) return;
    const section = document.createElement('div');
    const secId = child.id || `sec-${i}`;
    section.className = 'layout-section';
    section.dataset.sectionId = secId;
    section.innerHTML = `<div class="section-handle">☰ ${_getSectionLabel(child)}
      <span class="section-toggle" onclick="event.stopPropagation();toggleSection(this.closest('.layout-section'))">${child.classList.contains('hidden-section') ? '👁‍🗨 표시' : '👁 숨기기'}</span>
    </div>`;
    child.parentNode.insertBefore(section, child);
    section.appendChild(child);
    wrapper.appendChild(section);
    const saved = _getLayout();
    if (saved.hidden && saved.hidden.includes(secId)) {
      section.classList.add('hidden-section');
      section.querySelector('.section-toggle').textContent = '👁‍🗨 표시';
    }
  });
  container.appendChild(wrapper);
  _restoreOrder(wrapper);
}

function _getSectionLabel(el) {
  const h4 = el.querySelector('h4');
  if (h4) return h4.textContent.slice(0, 30);
  const cls = el.className || '';
  if (cls.includes('metric-row')) return '메트릭 카드';
  if (cls.includes('persona-grid')) return '페르소나 카드';
  if (cls.includes('chart-grid')) return '차트 영역';
  if (cls.includes('ov-summary')) return '요약 바';
  if (cls.includes('cards')) return '게임 카드';
  if (cls.includes('tbl-wrap')) return '테이블';
  return el.tagName.toLowerCase();
}

function toggleSection(sectionEl) {
  sectionEl.classList.toggle('hidden-section');
  const isHidden = sectionEl.classList.contains('hidden-section');
  sectionEl.querySelector('.section-toggle').textContent = isHidden ? '👁‍🗨 표시' : '👁 숨기기';
  _saveLayout();
}

function _getLayoutKey() {
  const activeTab = document.querySelector('.gtab.active');
  const tabId = activeTab ? activeTab.textContent.trim() : 'overview';
  const activeCat = document.querySelector('.cat-tab.active');
  const catId = activeCat ? activeCat.textContent.trim() : '';
  return `layout_${tabId}_${catId}`;
}

function _saveLayout() {
  document.querySelectorAll('.layout-container').forEach(container => {
    const order = [...container.children].map(s => s.dataset.sectionId).filter(Boolean);
    const hidden = [...container.children].filter(s => s.classList.contains('hidden-section')).map(s => s.dataset.sectionId);
    const key = _getLayoutKey();
    localStorage.setItem(key, JSON.stringify({ order, hidden }));
  });
}

function _getLayout() {
  try { return JSON.parse(localStorage.getItem(_getLayoutKey())) || {}; }
  catch { return {}; }
}

function _restoreOrder(container) {
  const saved = _getLayout();
  if (!saved.order) return;
  saved.order.forEach(secId => {
    const el = container.querySelector(`[data-section-id="${secId}"]`);
    if (el) container.appendChild(el);
  });
}

function _destroySortables() {
  _sortables.forEach(s => s.destroy());
  _sortables = [];
}

function resetLayout() {
  localStorage.removeItem(_getLayoutKey());
  document.querySelectorAll('.layout-section').forEach(s => {
    s.classList.remove('hidden-section');
    const toggle = s.querySelector('.section-toggle');
    if (toggle) toggle.textContent = '👁 숨기기';
  });
  _destroySortables();
  _initSortables();
}
</script>
