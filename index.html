<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프리플레이 통합 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b1120; font-family: 'Segoe UI', system-ui, sans-serif; }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #0f1a2e;
    border-bottom: 1px solid #1e3a5f;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar .logo {
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
    margin-right: 4px;
    white-space: nowrap;
  }
  .gtab {
    padding: 6px 18px;
    border: 1.5px solid var(--gc, #3b82f6);
    border-radius: 20px;
    background: transparent;
    color: var(--gc, #3b82f6);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    opacity: 0.55;
  }
  .gtab.active {
    background: var(--gc, #3b82f6);
    color: #fff;
    opacity: 1;
  }
  .gtab:hover:not(.active) { opacity: 0.9; }

  .ts {
    margin-left: auto;
    font-size: 11px;
    color: #334155;
    white-space: nowrap;
  }

  iframe {
    width: 100%;
    height: calc(100vh - 45px);
    border: none;
    display: block;
  }
</style>
</head>
<body>
  <div class="top-bar">
    <span class="logo">🎮 통합 대시보드</span>
    <button class="gtab active" style="--gc:#f59e0b" onclick="switchGame('overview',this)">종합</button>
    <button class="gtab" style="--gc:#10b981" onclick="switchGame('ctz',this)">CTZ</button>
    <button class="gtab" style="--gc:#3b82f6" onclick="switchGame('scj',this)">SCJ</button>
    <span class="ts">갱신: 2026-04-11 15:29:33</span>
  </div>
  <iframe id="frame-ctz" src="dashboard_ctz.html" style="display:none"></iframe>
  <div id="frame-scj" style="display:none" style="display:none;align-items:center;justify-content:center;height:100%;color:#4e6a85;flex-direction:column;gap:12px;"><div style="font-size:48px;opacity:.3">📭</div><div style="font-size:15px;">SCJ 데이터 없음</div><div style="font-size:12px;opacity:.6;">프리플레이를 실행하면 자동으로 표시됩니다</div></div>
  
<div id="overview-panel" style="display:block;overflow-y:auto;height:calc(100vh - 45px);padding:24px 28px;color:#e2e8f0;">
  <style>
    .ov-summary{display:flex;gap:8px;align-items:center;margin-bottom:20px;font-size:12px;color:#64748b;}
    .ov-summary b{color:#94a3b8;}
    .ov-cards{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;}
    .ov-card{flex:1;min-width:200px;background:#0f1a2e;border:1.5px solid #1e3a5f;border-radius:10px;padding:18px 20px;}
    .ov-card-title{font-size:16px;font-weight:700;margin-bottom:14px;}
    .ov-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e3a5f;font-size:13px;}
    .ov-item:last-child{border-bottom:none;}
    .ov-label{color:#94a3b8;}
    .ov-val{font-weight:600;}
    .ov-empty{color:#475569;font-size:13px;display:flex;align-items:center;justify-content:center;min-height:80px;}
    .ov-chart-wrap{background:#0f1a2e;border:1px solid #1e3a5f;border-radius:10px;padding:20px;max-width:600px;}
    .ov-chart-title{font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:14px;}
  </style>

  <div class="ov-summary">
    <b>전체 현황</b> &nbsp;·&nbsp;
    총 런 <b>1</b> &nbsp;·&nbsp;
    총 판 <b>5</b> &nbsp;·&nbsp;
    갱신: <b>2026-04-11 15:29:33</b>
  </div>

  <div class="ov-cards">
    <div class="ov-card ov-empty">SCJ 데이터 없음</div>
    <div class="ov-card" style="border-color:#10b981"><div class="ov-card-title" style="color:#10b981">#10b981</div><div class="ov-item"><span class="ov-label">클리어율</span><span class="ov-val" style="color:#10b981">80.0%</span></div><div class="ov-item"><span class="ov-label">평균 소요시간/판</span><span class="ov-val" style="color:#10b981">48.5s</span></div><div class="ov-item"><span class="ov-label">총 런</span><span class="ov-val" style="color:#10b981">1</span></div></div>
  </div>

  <div class="ov-chart-wrap">
    <div class="ov-chart-title">페르소나별 클리어율 비교 (%)</div>
    <canvas id="ovCompareChart" height="160"></canvas>
  </div>
  
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
(function(){
  var ctx = document.getElementById('ovCompareChart');
  if (!ctx) return;
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ["고수","중수","하수","초보"],
      datasets: [
        {
          label: 'SCJ',
          data: [null,null,null,null],
          backgroundColor: 'rgba(59,130,246,0.7)',
          borderColor: '#3b82f6',
          borderWidth: 1.5,
          borderRadius: 4,
        },
        {
          label: 'CTZ',
          data: [80.0,null,null,null],
          backgroundColor: 'rgba(16,185,129,0.7)',
          borderColor: '#10b981',
          borderWidth: 1.5,
          borderRadius: 4,
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 12 } } },
        tooltip: { callbacks: { label: function(c) { return c.dataset.label + ': ' + (c.raw !== null ? c.raw + '%' : '데이터 없음'); } } }
      },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e3a5f' } },
        y: { min: 0, max: 100, ticks: { color: '#94a3b8', callback: function(v){ return v+'%'; } }, grid: { color: '#1e3a5f' } }
      }
    }
  });
})();
</script>
<script>
var GAMES = ["ctz","scj"];
function switchGame(id, btn) {
  document.querySelectorAll('.gtab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  GAMES.forEach(function(g) {
    var f = document.getElementById('frame-' + g);
    if (f) f.style.display = (g === id) ? (f.tagName === 'IFRAME' ? 'block' : 'flex') : 'none';
  });
  var ov = document.getElementById('overview-panel');
  if (ov) ov.style.display = (id === 'overview') ? 'block' : 'none';
}
</script>
</body>
</html>
