<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프리플레이 통합 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b1120; font-family: 'Segoe UI', system-ui, sans-serif; }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #0f1a2e;
    border-bottom: 1px solid #1e3a5f;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar .logo {
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
    margin-right: 4px;
    white-space: nowrap;
  }
  .gtab {
    padding: 6px 18px;
    border: 1.5px solid var(--gc, #3b82f6);
    border-radius: 20px;
    background: transparent;
    color: var(--gc, #3b82f6);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    opacity: 0.55;
  }
  .gtab.active {
    background: var(--gc, #3b82f6);
    color: #fff;
    opacity: 1;
  }
  .gtab:hover:not(.active) { opacity: 0.9; }

  .ts {
    margin-left: auto;
    font-size: 11px;
    color: #334155;
    white-space: nowrap;
  }

  iframe {
    width: 100%;
    height: calc(100vh - 45px);
    border: none;
    display: block;
  }
</style>
</head>
<body>
  <div class="top-bar">
    <span class="logo">🎮 통합 대시보드</span>
    <button class="gtab active" style="--gc:#3b82f6" onclick="switchGame('scj',this)">SCJ</button>
    <button class="gtab " style="--gc:#10b981" onclick="switchGame('ctz',this)">CTZ</button>
    <span class="ts">갱신: 2026-04-01 18:27:45</span>
  </div>
  <iframe id="frame-scj" src="dashboard_scj.html"></iframe>
  <iframe id="frame-ctz" src="dashboard_ctz.html" style="display:none"></iframe>
<script>
var GAMES = ["scj","ctz"];
function switchGame(id, btn) {
  document.querySelectorAll('.gtab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  GAMES.forEach(function(g) {
    var f = document.getElementById('frame-' + g);
    if (f) f.style.display = (g === id) ? 'block' : 'none';
  });
}
</script>
</body>
</html>
